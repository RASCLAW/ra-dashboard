<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0f">
<title>RA Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e293b;--text:#e2e8f0;--muted:#64748b;--input-bg:#0a0a0f}
:root.light{--bg:#f1f5f9;--card:#ffffff;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--input-bg:#f8fafc}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
.m{font-family:'JetBrains Mono',monospace}
.tabs{display:flex;gap:3px;margin:0 16px 16px;background:var(--card);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px 0;border:none;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;font-family:'Space Grotesk',sans-serif;background:transparent;color:#64748b;transition:all .2s}
.tab.a{background:#22d3ee;color:#0a0a0f}
.cnt{padding:0 16px 16px}
.s{display:none}.s.a{display:block}
.c{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px;transition:background .3s}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.r:last-of-type{border-bottom:none}
.rl{display:flex;align-items:center;gap:10px}
.d{width:7px;height:7px;border-radius:50%}
.lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.val{font-size:18px;font-weight:700}
.icon-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.alert-danger{background:rgba(239,68,68,.15);color:#ef4444}
.alert-warning{background:rgba(245,158,11,.15);color:#f59e0b}
.alert-ok{background:rgba(16,185,129,.15);color:#10b981}
.alert-money{background:rgba(245,158,11,.15);color:#f59e0b}
.stale-warning{background:#ef444412;border:1px solid #ef444425;border-radius:8px;padding:10px;margin-top:10px;font-size:11px;color:#ef4444;line-height:1.5}
.jah-accent{color:#f472b6}
.jah-bg{background:rgba(244,114,182,.1)}
.jah-border{border:1px solid rgba(244,114,182,.2)}
.log-entry{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.log-entry:last-of-type{border-bottom:none}
.empty-state{text-align:center;padding:14px 0 2px;font-size:11px;color:#4a5568;font-style:italic}

/* QUICK LOG */
.fab{position:fixed;bottom:24px;right:20px;width:56px;height:56px;border-radius:50%;background:#22d3ee;color:#0a0a0f;border:none;font-size:28px;font-weight:700;cursor:pointer;z-index:1000;box-shadow:0 4px 20px rgba(34,211,238,.35);transition:transform .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}
.ql-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1500;display:none;align-items:flex-end;justify-content:center}
.ql-overlay.open{display:flex}
.ql-sheet{width:100%;max-width:500px;max-height:85vh;background:var(--card);border-radius:20px 20px 0 0;padding:20px 16px 32px;overflow-y:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ql-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ql-header h3{font-size:16px;font-weight:700}
.ql-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.ql-cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.ql-cat{padding:8px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.ql-cat.a{background:#22d3ee;color:#0a0a0f;border-color:#22d3ee}
.ql-form{display:none}.ql-form.a{display:block}
.ql-field{margin-bottom:14px}
.ql-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.ql-field input,.ql-field select{width:100%;padding:12px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.ql-field input:focus,.ql-field select:focus{border-color:#22d3ee}
.ql-toggle{display:flex;gap:6px}
.ql-toggle button{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.ql-toggle button.a{background:#22d3ee;color:#0a0a0f;border-color:#22d3ee}
.ql-submit{width:100%;padding:14px;background:#22d3ee;color:#0a0a0f;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.ql-submit:disabled{opacity:.4;cursor:not-allowed}
.ql-done{text-align:center;padding:32px 0}
.ql-done .check{font-size:48px;margin-bottom:8px}
.ql-done p{color:var(--muted);font-size:13px}
.profile-sw{display:flex;gap:6px;margin:0 16px 12px}
.prof-btn{padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:#64748b;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s}
.prof-btn.a{background:#22d3ee;color:#0a0a0f;border-color:#22d3ee}
.prof-btn.a-belle{background:#f472b6;color:#0a0a0f;border-color:#f472b6}
.weather-rec-moto{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:#10b981}
.weather-rec-early{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:#f59e0b}
.weather-rec-car{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444}
.loader-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
.loader-screen.hide{opacity:0;pointer-events:none}
.loader-dot{width:8px;height:8px;border-radius:50%;background:#22d3ee;display:inline-block;margin:0 4px;animation:pulse 1.2s infinite}
.loader-dot:nth-child(2){animation-delay:.2s}
.loader-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
</style>
</head>
<body>

<div class="loader-screen" id="loader">
  <div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-family:'JetBrains Mono',monospace;letter-spacing:1px">PROJECT DASH</div>
  <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
</div>

<div style="padding:20px 16px 12px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:7px;height:7px;border-radius:50%;background:#10b981;box-shadow:0 0 6px #10b981" id="status-dot"></div>
      <span class="m" style="font-size:10px;color:#64748b;letter-spacing:1px" id="dash-label"></span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="m" style="font-size:14px;color:#22d3ee;font-weight:500" id="live-clock"></span>
      <button onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:14px" id="theme-btn">🌙</button>
    </div>
  </div>
  <h1 style="font-size:24px;font-weight:700;letter-spacing:-.5px" id="header-date"></h1>
  <p style="color:#64748b;font-size:12px;margin-top:2px" id="header-sub"></p>
</div>

<div class="profile-sw">
  <button class="prof-btn a" id="prof-ra" onclick="setProfile('ra')">RA</button>
  <button class="prof-btn" id="prof-belle" onclick="setProfile('arabelle')">Arabelle</button>
</div>

<div class="tabs" id="tab-bar"></div>

<div class="cnt">
  <div class="s a" id="ov"></div>
  <div class="s" id="jh"></div>
  <div class="s" id="tr"></div>
  <div class="s" id="tl"></div>
  <div class="s" id="lg"></div>
  <div class="s" id="ex"></div>
</div>

<div style="text-align:center;padding:20px 0 16px">
  <span class="m" style="font-size:9px;color:#334155" id="footer"></span>
</div>

<button class="fab" onclick="openQL()">+</button>

<div class="ql-overlay" id="ql-overlay" onclick="if(event.target===this)closeQL()">
  <div class="ql-sheet" id="ql-sheet">
    <div class="ql-header"><h3 id="ql-title">Quick Log</h3><button class="ql-close" onclick="closeQL()">&times;</button></div>
    <div class="ql-cats" id="ql-cats">
      <button class="ql-cat a" onclick="setQL('diaper')">Diaper</button>
      <button class="ql-cat" onclick="setQL('feeding')">Feeding</button>
      <button class="ql-cat" onclick="setQL('transaction')">Transaction</button>
      <button class="ql-cat" onclick="setQL('balance')">Balance</button>
      <button class="ql-cat" onclick="setQL('activity')">Activity</button>
      <button class="ql-cat" onclick="setQL('sleep')">Sleep</button>
    </div>
    <div id="ql-forms">
      <div class="ql-form a" id="ql-diaper">
        <div class="ql-field"><label>Type</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-diaper-type')">Wet</button><button onclick="qlToggle(this,'ql-diaper-type')">Poop</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-diaper-notes" placeholder="e.g. semi-hard, after lunch"></div>
        <input type="hidden" id="ql-diaper-type" value="wet">
      </div>
      <div class="ql-form" id="ql-feeding">
        <div class="ql-field"><label>Food</label><input type="text" id="ql-feeding-food" placeholder="e.g. Lugaw + Egg, Milk"></div>
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-feeding-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-feeding-who')">RA</button><button onclick="qlToggle(this,'ql-feeding-who')">Arabelle</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-feeding-notes" placeholder="e.g. ate well, only half"></div>
        <input type="hidden" id="ql-feeding-who" value="Baby Jah">
      </div>
      <div class="ql-form" id="ql-transaction">
        <div class="ql-field"><label>Amount (P)</label><input type="number" id="ql-tx-amount" placeholder="0"></div>
        <div class="ql-field"><label>Description</label><input type="text" id="ql-tx-desc" placeholder="e.g. Parking, Lugaw"></div>
        <div class="ql-field"><label>Category</label><select id="ql-tx-cat"><option value="food">Food</option><option value="transport">Transport</option><option value="shopping">Shopping</option><option value="load">Load</option><option value="transfer">Transfer</option></select></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-tx-notes" placeholder=""></div>
      </div>
      <div class="ql-form" id="ql-balance">
        <div class="ql-field"><label>Account</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-bal-acct')">Payroll</button><button onclick="qlToggle(this,'ql-bal-acct')">Savings</button><button onclick="qlToggle(this,'ql-bal-acct')">Pocket Cash</button></div></div>
        <div class="ql-field"><label>New Balance (P)</label><input type="number" id="ql-bal-amount" placeholder="0"></div>
        <input type="hidden" id="ql-bal-acct" value="payroll">
      </div>
      <div class="ql-form" id="ql-activity">
        <div class="ql-field"><label>Activity</label><input type="text" id="ql-act-desc" placeholder="e.g. Morning walk, Watching Miss Rachel"></div>
      </div>
      <div class="ql-form" id="ql-sleep">
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-sleep-who')">RA</button></div></div>
        <div class="ql-field"><label>Action</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-action')">Slept</button><button onclick="qlToggle(this,'ql-sleep-action')">Woke</button></div></div>
        <div class="ql-field"><label>Time</label><input type="time" id="ql-sleep-time"></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-sleep-notes" placeholder="e.g. Post-shift nap"></div>
        <input type="hidden" id="ql-sleep-who" value="Baby Jah">
        <input type="hidden" id="ql-sleep-action" value="slept">
      </div>
    </div>
    <button class="ql-submit" id="ql-submit" onclick="submitQL()">Log It</button>
    <div class="ql-done" id="ql-done" style="display:none"><div class="check">&#10003;</div><p>Logged!</p></div>
  </div>
</div>

<script>
// === THEME ===
function toggleTheme(){
  const root=document.documentElement;
  const isLight=root.classList.toggle('light');
  document.getElementById('theme-btn').textContent=isLight?'🌑':'🌙';
  localStorage.setItem('theme',isLight?'light':'dark');
}
(function(){const t=localStorage.getItem('theme');if(t==='light'){document.documentElement.classList.add('light');document.addEventListener('DOMContentLoaded',()=>{document.getElementById('theme-btn').textContent='🌑'})}})();

// === GLOBALS ===
let D=null, W=null, PROFILE='ra';
let balHidden=localStorage.getItem('balHidden')==='true';
function toggleBal(){balHidden=!balHidden;localStorage.setItem('balHidden',balHidden);render()}
const catIcons={task:'#22d3ee',health:'#10b981',finance:'#f59e0b',travel:'#a78bfa',family:'#f472b6'};
const catEmoji={task:'📋',health:'🏥',finance:'💰',travel:'✈️',family:'👨‍👩‍👦'};
const foodEmoji=['🍚','🍲','🍖','🍗','🍳','🍪','🥘','🍜'];
const alertLabels={danger:'!!',warning:'!!',ok:'OK',money:'$$'};
const wcDesc={0:'Clear sky',1:'Mostly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',53:'Drizzle',55:'Dense drizzle',61:'Light rain',63:'Moderate rain',65:'Heavy rain',80:'Light showers',81:'Moderate showers',82:'Heavy showers',95:'Thunderstorm',96:'Thunderstorm + hail',99:'Heavy thunderstorm'};
const wcIcon={0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',48:'🌫',51:'🌦',53:'🌧',55:'🌧',61:'🌧',63:'🌧',65:'🌧',80:'🌦',81:'🌧',82:'⛈',95:'⛈',96:'⛈',99:'⛈'};

// === PHT UTILITIES ===
// Use Date.now() for all calculations (UTC-based, no timezone bugs)
// Use Intl for display only
function manilaHour(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',hour:'numeric',hour12:false}))}
function manilaMinute(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',minute:'numeric'}))}
function manilaDayNum(){return new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'narrow'})==='S'?((new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'})==='Sunday')?0:6):['Monday','Tuesday','Wednesday','Thursday','Friday'].indexOf(new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'}))+1}
function manilaDateStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})}
function fmt(n){return n==null?'--':'P'+n.toLocaleString()}
function fmt12(t){if(!t)return'';let s=typeof t==='string'?t:String(t);s=s.replace(/[^\d:]/g,'');const parts=s.match(/^(\d{1,2}):(\d{2})/);if(!parts)return'';const h=parseInt(parts[1]),m=parseInt(parts[2]);const ampm=h>=12?'PM':'AM';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ampm}
function fmtDate(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const parts=d.split('-');return m[parseInt(parts[1])-1]+' '+parseInt(parts[2])}
function isStale(d,days){if(!d)return true;return(Date.now()-new Date(d+'T00:00:00+08:00').getTime())>days*86400000}
function timeAgo(d,t){if(!d)return null;let tStr=t||'12:00';if(typeof tStr!=='string')tStr=String(tStr);tStr=tStr.replace(/[^\d:]/g,'');if(tStr.length===1||tStr.length===2)tStr=tStr+':00';if(!tStr.match(/^\d{1,2}:\d{2}/))tStr='12:00';const parts=tStr.match(/^(\d{1,2}):(\d{2})/);if(!parts)return null;const clean=parts[1].padStart(2,'0')+':'+parts[2];const then=new Date(d+'T'+clean+':00+08:00');if(isNaN(then.getTime()))return null;const diff=Date.now()-then.getTime();if(diff<0)return 'just now';const mins=Math.floor(diff/60000);if(mins<60)return mins+'m ago';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';const days=Math.floor(hrs/24);return days+'d ago'}
function daysUntil(d){const today=manilaDateStr();const todayMs=new Date(today+'T00:00:00+08:00').getTime();const thenMs=new Date(d+'T00:00:00+08:00').getTime();const diff=Math.round((thenMs-todayMs)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff<0)return Math.abs(diff)+'d ago';return 'in '+diff+' days'}

function getRAStatus(){
  const h=manilaHour();const m=manilaMinute();const day=manilaDayNum();
  const isWorkDay=day>=1&&day<=5&&!isHoliday(manilaDateStr());
  if(!isWorkDay)return{text:'Home (rest day)',icon:'🏠',color:'#10b981'};
  if(h>=20||h<4)return{text:'At work',icon:'💼',color:'#22d3ee'};
  if(h>=4&&h<5)return{text:'Wrapping up shift',icon:'💼',color:'#f59e0b'};
  if(h===5&&m<30)return{text:'Heading home',icon:'🛵',color:'#a78bfa'};
  if(h>=5&&h<12)return{text:'Home (sleeping)',icon:'😴',color:'#64748b'};
  if(h>=12&&h<19)return{text:'Home (awake)',icon:'🏠',color:'#10b981'};
  if(h>=19&&h<20)return{text:'Getting ready for work',icon:'👔',color:'#f59e0b'};
  return{text:'Home',icon:'🏠',color:'#10b981'};
}

function getArabelleStatus(){
  const h=manilaHour();const day=manilaDayNum();
  if(day===0||day===6||isHoliday(manilaDateStr()))return{text:'Rest day',icon:'🏠',color:'#10b981'};
  if(day===1||day===5){
    if(h>=6&&h<15)return{text:'Working from home',icon:'💻',color:'#22d3ee'};
    return{text:'Home',icon:'🏠',color:'#10b981'};
  }
  if(h<5)return{text:'Sleeping',icon:'😴',color:'#64748b'};
  if(h>=5&&h<6)return{text:'Getting ready',icon:'👔',color:'#f59e0b'};
  if(h===6&&!0)return{text:'Commuting to office',icon:'🏍',color:'#a78bfa'};
  if(h>=6&&h<15)return{text:'At office',icon:'💼',color:'#22d3ee'};
  if(h>=15&&h<16)return{text:'Heading home',icon:'🏍',color:'#a78bfa'};
  return{text:'Home',icon:'🏠',color:'#10b981'};
}

// === HOLIDAYS ===
let HOLIDAYS=[];
async function fetchHolidays(){
  try{
    const year=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).split('-')[0];
    const res=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/PH`);
    HOLIDAYS=await res.json();
  }catch(e){HOLIDAYS=[]}
}
function getTodayHoliday(){
  const today=manilaDateStr();
  const h=HOLIDAYS.find(h=>h.date===today);
  return h?h.name:null;
}
function isHoliday(dateStr){
  return HOLIDAYS.some(h=>h.date===dateStr);
}
function getUpcomingHoliday(){
  const today=manilaDateStr();
  return HOLIDAYS.find(h=>h.date>=today)||null;
}

// === WEATHER ===
async function fetchWeather(lat,lon){
  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability,weathercode&timezone=Asia%2FManila&forecast_days=2`;
    const res=await fetch(url);
    return await res.json();
  }catch(e){return null}
}

function getCommuteWeather(weather,hour,dayOffset){
  if(!weather||!weather.hourly)return null;
  const idx=dayOffset*24+hour;
  if(idx>=weather.hourly.time.length)return null;
  return{
    time:weather.hourly.time[idx],
    rain:weather.hourly.precipitation_probability[idx],
    code:weather.hourly.weathercode[idx]
  };
}

function getCommuteRec(rain,code){
  if(rain>=60||code>=63)return{text:'Book a car (Grab/InDrive)',cls:'weather-rec-car',icon:'🚗'};
  if(rain>=30||code>=51)return{text:'Book mototaxi early, bring umbrella',cls:'weather-rec-early',icon:'☂️'};
  return{text:'Mototaxi is fine',cls:'weather-rec-moto',icon:'🏍'};
}

// === CLOCK & HEADER ===
function updateClock(){
  const h=manilaHour();const m=manilaMinute();
  const ampm=h>=12?'PM':'AM';const h12=h%12||12;
  document.getElementById('live-clock').textContent=h12+':'+String(m).padStart(2,'0')+' '+ampm+' PHT';
}

function setProfile(p){

function buildTabs(){
  const bar=document.getElementById('tab-bar');
  const tabs=PROFILE==='ra'?
    [{id:'ov',l:'Home'},{id:'jh',l:'Jah'},{id:'tr',l:'Trip'},{id:'ex',l:'Expenses'},{id:'tl',l:'Timeline'},{id:'lg',l:'Log'}]:
    [{id:'ov',l:'Home'},{id:'jh',l:'Jah'},{id:'tr',l:'Trip'},{id:'ex',l:'Expenses'},{id:'tl',l:'Timeline'},{id:'lg',l:'Log'}];
  bar.innerHTML=tabs.map((t,i)=>`<button class="tab${i===0?' a':''}" onclick="sw('${t.id}',this)">${t.l}</button>`).join('');
  document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));
  document.getElementById('ov').classList.add('a');
}

const TAB_IDS=['ov','jh','tr','tl','ex'];
let currentTabIdx=0;
function sw(id,b){document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('a'));document.getElementById(id).classList.add('a');b.classList.add('a');currentTabIdx=TAB_IDS.indexOf(id)}

// Swipe between tabs
(function(){let sx=0,sy=0;const cnt=document.querySelector('.cnt');
cnt.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
cnt.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx;const dy=e.changedTouches[0].clientY-sy;
if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
  const newIdx=dx<0?Math.min(currentTabIdx+1,TAB_IDS.length-1):Math.max(currentTabIdx-1,0);
  if(newIdx!==currentTabIdx){const tabs=document.querySelectorAll('.tab');sw(TAB_IDS[newIdx],tabs[newIdx])}
}},{passive:true})
})()

}

function jahStatus(){
  const jah=D.shared.baby_jah;if(!jah)return{icon:'👶',text:'No data',sub:''};
  const toMin=(d,t)=>{if(!d||!t)return-Infinity;const[h,m]=(t||'0:0').split(':').map(Number);return(new Date(d+'T00:00:00+08:00').getTime()/60000)+h*60+m};
  const nowMin=Date.now()/60000;
  const ago=m=>{const d=nowMin-m;if(d<1)return'just now';if(d<60)return Math.round(d)+'m ago';if(d<1440)return Math.round(d/60)+'h ago';return Math.round(d/1440)+'d ago'};
  // Find most recent event across all categories
  const events=[];
  (jah.feeding||[]).forEach(f=>events.push({type:'fed',min:toMin(f.date,f.time),label:f.food,time:f.time}));
  (jah.sleep||[]).forEach(s=>{
    if(s.slept)events.push({type:'slept',min:toMin(s.date,s.slept),label:s.type,time:s.slept});
    if(s.woke)events.push({type:'woke',min:toMin(s.date,s.woke),label:s.type,time:s.woke});
  });
  (jah.diapers||[]).forEach(d=>events.push({type:'diaper',min:toMin(d.date,d.time),label:d.type,time:d.time}));
  (jah.activities||[]).forEach(a=>events.push({type:'activity',min:toMin(a.date,a.time),label:a.activity,time:a.time}));
  events.sort((a,b)=>b.min-a.min);
  if(!events.length)return{icon:'👶',text:'No data yet',sub:''};
  const latest=events[0];const sinceMin=nowMin-latest.min;
  const lastFed=events.find(e=>e.type==='fed');const sinceFed=lastFed?(nowMin-lastFed.min):Infinity;
  const lastSlept=events.find(e=>e.type==='slept');
  const lastWoke=events.find(e=>e.type==='woke');
  // Determine status
  if(latest.type==='slept'){return{icon:'😴',text:'Sleeping',sub:ago(latest.min)+' ('+fmt12(latest.time)+')'};}
  if(latest.type==='woke'){
    if(sinceFed>120)return{icon:'🥱',text:'Just woke up -- probably hungry',sub:ago(latest.min)};
    if(sinceMin<30)return{icon:'🥱',text:'Just woke up',sub:ago(latest.min)};
  }
  if(latest.type==='fed'){
    if(sinceMin<30)return{icon:'🍼',text:'Just ate '+latest.label,sub:fmt12(latest.time)};
    if(sinceMin<90)return{icon:'😊',text:'Fed -- '+latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='activity'){
    if(latest.label.toLowerCase().includes('bath'))return{icon:'🛁',text:'Fresh from bath',sub:fmt12(latest.time)};
    if(sinceMin<60)return{icon:'🏃',text:latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='diaper'){
    if(sinceMin<15)return{icon:'🧷',text:'Just had a diaper change',sub:fmt12(latest.time)};
  }
  // Fallback: check hunger
  if(sinceFed>180)return{icon:'😐',text:'Might be hungry soon',sub:'Last fed '+ago(lastFed.min)};
  if(sinceFed>90)return{icon:'😊',text:'Playing/awake',sub:'Last fed '+ago(lastFed.min)};
  return{icon:'😊',text:'Doing good',sub:ago(latest.min)};
}

  const now=new Date(Date.now()+8*3600000);

      <div style="flex:1;background:#f59e0b18;border:1px solid #f59e0b30;border-radius:8px;padding:8px;text-align:center"><div class="m" style="font-size:20px;font-weight:700;color:#f59e0b">${pendingBills.length}</div><div class="m" style="font-size:9px;color:#f59e0b">PENDING</div></div>
      <div style="flex:1;background:#22d3ee18;border:1px solid #22d3ee30;border-radius:8px;padding:8px;text-align:center"><div class="m" style="font-size:18px;font-weight:700;color:#22d3ee">${fmt(billsTotal)}</div><div class="m" style="font-size:9px;color:#22d3ee">TOTAL</div></div>
    </div>`;
  if(pendingBills.length){h+=`<div class="m" style="font-size:9px;color:#f59e0b;letter-spacing:1.5px;margin-bottom:8px">UPCOMING</div>`;pendingBills.forEach(b=>{h+=`<div class="r"><div class="rl"><div class="d" style="background:#f59e0b"></div><span style="font-size:13px">${b.name}</span></div><div class="rl" style="gap:12px"><span class="m" style="font-weight:600;font-size:13px">${fmt(b.amount)}</span></div></div>`})}
  if(paidBills.length){h+=`<div class="m" style="font-size:9px;color:#10b981;letter-spacing:1.5px;margin:12px 0 8px">PAID</div>`;paidBills.forEach(b=>{h+=`<div class="r"><div class="rl"><div class="d" style="background:#10b981"></div><span style="font-size:13px;color:#64748b">${b.name}</span></div><div class="rl"><span class="m" style="font-size:13px;color:#64748b">${fmt(b.amount)}</span></div></div>`})}
  h+='</div>';

  const txns=(P.transactions||[]).slice(-10).reverse();
  if(txns.length){
    h+='<div class="c"><div class="ct m">Recent Transactions</div>';
    let lastDate='';
    txns.forEach((t,idx)=>{
      if(t.date!==lastDate){lastDate=t.date;h+=`<div class="m" style="font-size:9px;color:#64748b;letter-spacing:1.5px;margin:${idx>0?'12px':'0'} 0 8px">${fmtDate(t.date).toUpperCase()}</div>`}
      const emoji=foodEmoji[Math.abs(t.description.split('').reduce((a,c)=>a+c.charCodeAt(0),0))%foodEmoji.length];
      h+=`<div class="r"><div class="rl"><div class="icon-box" style="background:#10b98118;font-size:13px">${emoji}</div><div><span style="font-size:13px">${t.description}</span>${t.time?`<div class="m" style="font-size:10px;color:#64748b">${fmt12(t.time)}</div>`:''}</div></div><span class="m" style="font-size:13px;color:#64748b">${fmt(t.amount)}</span></div>`;
    });h+=`<div class="empty-state">Amounts fill in as you send receipts</div></div>`;
  }else if(PROFILE==='arabelle'){h+=`<div class="c"><div class="ct m">Recent Transactions</div><div class="empty-state">No transactions logged yet. Send receipt screenshots to start tracking.</div></div>`}

  const remaining=total-pendingTotal-tripTotal;
  h+=`<div class="c"><div class="ct m">Quick Stats</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#0a0a0f;border-radius:8px;padding:12px;text-align:center"><div class="m" style="font-size:18px;font-weight:700;color:#22d3ee">${fmt(total)}</div><div class="m" style="font-size:9px;color:#64748b;margin-top:3px">CASH ON HAND</div></div>
      <div style="background:#0a0a0f;border-radius:8px;padding:12px;text-align:center"><div class="m" style="font-size:18px;font-weight:700;color:#f59e0b">${fmt(pendingTotal)}</div><div class="m" style="font-size:9px;color:#64748b;margin-top:3px">BILLS DUE</div></div>
      <div style="background:#0a0a0f;border-radius:8px;padding:12px;text-align:center"><div class="m" style="font-size:18px;font-weight:700;color:#10b981">${fmt(total-pendingTotal)}</div><div class="m" style="font-size:9px;color:#64748b;margin-top:3px">AFTER BILLS</div></div>
      ${tripTotal?`<div style="background:#0a0a0f;border-radius:8px;padding:12px;text-align:center"><div class="m" style="font-size:18px;font-weight:700;color:#a78bfa">~${fmt(tripTotal)}</div><div class="m" style="font-size:9px;color:#64748b;margin-top:3px">TRIP EST</div></div>`:''}
    </div>`;
  if(remaining<5000)h+=`<div class="stale-warning">After bills + trip: <span class="m" style="font-weight:700">${fmt(remaining)}</span> remaining.</div>`;
  h+='</div>';

  if(D.shared.patterns&&D.shared.patterns.length){
    h+='<div class="c"><div class="ct m">Spending Patterns</div>';
    D.shared.patterns.forEach(p=>{h+=`<div class="r"><div class="rl"><div class="d" style="background:#f59e0b"></div><span style="font-size:13px">${p.category}</span></div><div class="rl" style="gap:12px"><span class="m" style="color:#64748b;font-size:10px">${p.frequency}</span><span class="m" style="font-weight:600;font-size:13px">${p.amount?'~'+fmt(p.amount):'--'}</span></div></div>`});
    h+=`<div class="empty-state">More patterns as data builds up</div></div>`;
  }
  el.innerHTML=h;
}

// === QUICK LOG ===
const QUICKLOG_ENDPOINT='https://script.google.com/macros/s/AKfycbzq6DG2v4oYwnyt8IPWd97NJbVxu0kXdoMd1NGhrSJ1ns3kdSkT9wwVgR66jHOq62Zp/exec';
let qlCat='diaper';


function tickTodo(i){
  const check=document.getElementById('todo-check-'+i);
  const text=document.getElementById('todo-text-'+i);
  const todoItem=D[PROFILE].todos.filter(t=>!t.done).sort((a,b)=>{if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due)})[i];
  const done=JSON.parse(localStorage.getItem('done_todos')||'[]');
  if(check.innerHTML){
    // Uncheck
    check.innerHTML='';check.style.background='';check.style.borderColor='#64748b';check.style.color='';
    text.style.textDecoration='';text.style.opacity='1';
    if(todoItem){const idx=done.indexOf(todoItem.text);if(idx>-1)done.splice(idx,1)}
  }else{
    // Check
    check.innerHTML='&#10003;';check.style.background='#10b981';check.style.borderColor='#10b981';check.style.color='#fff';check.style.fontSize='12px';
    text.style.textDecoration='line-through';text.style.opacity='.4';
    if(todoItem)done.push(todoItem.text);
  }
  localStorage.setItem('done_todos',JSON.stringify(done));
}

function tickAraTodo(i){
  const check=document.getElementById('ara-todo-check-'+i);
  const text=document.getElementById('ara-todo-text-'+i);
  const todoItem=D.arabelle.todos.filter(t=>!t.done).sort((a,b)=>{if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due)})[i];
  const done=JSON.parse(localStorage.getItem('done_ara_todos')||'[]');
  if(check.innerHTML){
    check.innerHTML='';check.style.background='';check.style.borderColor='#64748b';check.style.color='';
    text.style.textDecoration='';text.style.opacity='1';
    if(todoItem){const idx=done.indexOf(todoItem.text);if(idx>-1)done.splice(idx,1)}
  }else{
    check.innerHTML='&#10003;';check.style.background='#10b981';check.style.borderColor='#10b981';check.style.color='#fff';check.style.fontSize='12px';
    text.style.textDecoration='line-through';text.style.opacity='.4';
    if(todoItem)done.push(todoItem.text);
  }
  localStorage.setItem('done_ara_todos',JSON.stringify(done));

function openQL(){
  document.getElementById('ql-overlay').classList.add('open');
  document.getElementById('ql-submit').style.display='';
  document.getElementById('ql-done').style.display='none';
  document.getElementById('ql-forms').style.display='';
  document.getElementById('ql-cats').style.display='';
  // Set default time for sleep
  const now=new Date().toLocaleString('en-CA',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:false}).slice(-5);
  const sleepTime=document.getElementById('ql-sleep-time');
  if(sleepTime)sleepTime.value=now;
}
function closeQL(){document.getElementById('ql-overlay').classList.remove('open')}

function setQL(cat){
  qlCat=cat;
  document.querySelectorAll('.ql-cat').forEach(b=>b.classList.remove('a'));
  event.target.classList.add('a');
  document.querySelectorAll('.ql-form').forEach(f=>f.classList.remove('a'));
  document.getElementById('ql-'+cat).classList.add('a');
}

function qlToggle(btn,hiddenId){
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('a'));
  btn.classList.add('a');
  document.getElementById(hiddenId).value=btn.textContent.trim();
}

async function submitQL(){
  const btn=document.getElementById('ql-submit');
  btn.disabled=true;btn.textContent='Logging...';
  let payload={category:qlCat,logged_by:PROFILE==='arabelle'?'Arabelle':'RA'};

  switch(qlCat){
    case 'diaper':
      payload.who='Baby Jah';
      payload.detail_1=document.getElementById('ql-diaper-type').value;
      payload.notes=document.getElementById('ql-diaper-notes').value;
      break;
    case 'feeding':
      payload.who=document.getElementById('ql-feeding-who').value;
      payload.detail_1=document.getElementById('ql-feeding-food').value;
      payload.notes=document.getElementById('ql-feeding-notes').value;
      break;
    case 'transaction':
      payload.who=payload.logged_by;
      payload.detail_1=document.getElementById('ql-tx-desc').value;
      payload.detail_2=document.getElementById('ql-tx-cat').value;
      payload.amount=parseFloat(document.getElementById('ql-tx-amount').value)||0;
      payload.notes=document.getElementById('ql-tx-notes').value;
      break;
    case 'balance':
      payload.detail_1=document.getElementById('ql-bal-acct').value;
      payload.amount=parseFloat(document.getElementById('ql-bal-amount').value)||0;
      break;
    case 'activity':
      payload.who='Baby Jah';
      payload.detail_1=document.getElementById('ql-act-desc').value;
      break;
    case 'sleep':
      payload.who=document.getElementById('ql-sleep-who').value;
      payload.detail_1=document.getElementById('ql-sleep-action').value;
      payload.detail_2=document.getElementById('ql-sleep-time').value;
      payload.notes=document.getElementById('ql-sleep-notes').value;
      break;
  }

  try{
    const fd=new FormData();
    fd.append('payload',JSON.stringify(payload));
    await fetch(QUICKLOG_ENDPOINT,{method:'POST',body:fd,mode:'no-cors'});
  }catch(e){}

  // Show confirmation
  document.getElementById('ql-forms').style.display='none';
  document.getElementById('ql-cats').style.display='none';
  btn.style.display='none';
  document.getElementById('ql-done').style.display='';
  setTimeout(()=>{closeQL();btn.disabled=false;btn.textContent='Log It';
    // Clear inputs
    document.querySelectorAll('#ql-forms input[type=text],#ql-forms input[type=number]').forEach(i=>i.value='');
  },1500);
}

// === MERGE SHEET DATA ===
function mergeSheetData(D,rows){
  if(!rows||!rows.length)return;
  const today=manilaDateStr();
  for(const r of rows){
    // Normalize date/time -- Google Sheets returns ISO Date objects
    let date=r.date||today;
    let time=r.time||'00:00';
    // Date: "2026-03-24T00:00:00.000Z" -> "2026-03-24"
    date=String(date);
    if(date.includes('T'))date=date.split('T')[0];
    if(!date.match(/^\d{4}-\d{2}-\d{2}$/))date=today;
    // Time: "1899-12-30T14:36:00.000Z" -> "14:36"
    time=String(time);
    if(time.includes('T')){
      const tMatch=time.match(/T(\d{2}):(\d{2})/);
      time=tMatch?(tMatch[1]+':'+tMatch[2]):'00:00';
    }
    time=time.replace(/[^\d:]/g,'');
    if(!time.match(/^\d{1,2}:\d{2}/))time='00:00';
    const ts=r.timestamp||'';
    switch(r.category){
      case 'diaper':{
        const dtype=(r.detail_1||'wet').toString().toLowerCase();
        if(!D.shared.baby_jah.diapers.some(d=>d.date===date&&d.time===time&&d.type===dtype)){
          D.shared.baby_jah.diapers.push({date,time,type:dtype,notes:r.notes||''});
        }}break;
      case 'feeding':{
        if(!r.detail_1||!r.detail_1.toString().trim())break;
        const feedWho=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(feedWho==='baby jah'){
          if(!D.shared.baby_jah.feeding.some(f=>f.date===date&&f.time===time&&f.food===r.detail_1)){
            D.shared.baby_jah.feeding.push({date,time,food:r.detail_1||'',notes:r.notes||''});
          }
        }else{
          const tgt=feedWho==='arabelle'?D.arabelle:D.ra;
          if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
            tgt.transactions.push({date,time,description:r.detail_1||'',amount:null,category:'food'});
          }
        }}break;
      case 'transaction':{
        const who=(r.logged_by||'RA').toLowerCase();
        const tgt=who==='arabelle'?D.arabelle:D.ra;
        if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
          tgt.transactions.push({date,time,description:r.detail_1||'',amount:r.amount?parseFloat(r.amount):null,category:r.detail_2||'shopping'});
        }}break;
      case 'balance':{
        const acct=(r.detail_1||'').toLowerCase().replace(/ /g,'_');
        if(D.shared.accounts[acct]){
          D.shared.accounts[acct].balance=parseFloat(r.amount)||0;
          D.shared.accounts[acct].updated=date;
        }}break;
      case 'activity':
        if(!D.shared.baby_jah.activities.some(a=>a.date===date&&a.time===time&&a.activity===r.detail_1)){
          D.shared.baby_jah.activities.push({date,time,activity:r.detail_1||''});
        }break;
      case 'sleep':{
        const action=(r.detail_1||'slept').toString().toLowerCase();
        let sleepTime=r.detail_2||time;
        sleepTime=String(sleepTime);if(sleepTime.includes('T')){const sm=sleepTime.match(/T(\d{2}):(\d{2})/);sleepTime=sm?(sm[1]+':'+sm[2]):time;}
        const who=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(who==='baby jah'||who==='baby_jah'){
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.shared.baby_jah.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.shared.baby_jah.sleep.push({date,slept:st,woke:wk,type:parseInt(sleepTime)>=18||parseInt(sleepTime)<6?'night':'nap',notes:r.notes||''});
          }
        }else{
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.ra.schedule.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.ra.schedule.sleep.push({date,slept:st,woke:wk,notes:r.notes||''});
          }
        }}break;
    }
  }
  // Sort arrays by date+time
  const sortDT=(a,b)=>(a.date+a.time).localeCompare(b.date+b.time);
  D.shared.baby_jah.diapers.sort(sortDT);
  D.shared.baby_jah.feeding.sort(sortDT);
  D.shared.baby_jah.activities.sort(sortDT);
  D.shared.baby_jah.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.schedule.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.transactions.sort(sortDT);
}

// === INIT ===
async function init(){
  try{
    const [dataRes]=await Promise.all([fetch('dashboard-data.json'),fetchHolidays()]);
    D=await dataRes.json();

    // Fetch Quick Log sheet data
    try{
      const sheetRes=await fetch(QUICKLOG_ENDPOINT);
      const sheetRows=await sheetRes.json();
      mergeSheetData(D,sheetRows);
    }catch(e){/* Sheet unavailable, use JSON only */}

    W=await fetchWeather(D.location.lat,D.location.lon);

    updateHeader();buildTabs();render();

    const updated=new Date(D.last_updated);
    document.getElementById('dash-label').textContent='Updated '+updated.toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('footer').textContent='RA Dashboard';

    if(isStale(D.last_updated,3)){
      document.getElementById('status-dot').style.background='#f59e0b';
      document.getElementById('status-dot').style.boxShadow='0 0 6px #f59e0b';
    }
    document.getElementById('loader').classList.add('hide');
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.remove()},500);
  }catch(e){
    document.getElementById('loader').classList.add('hide');
    document.getElementById('ov').innerHTML=`<div class="c"><div class="ct m">Error</div><p style="color:#ef4444;font-size:13px">Could not load: ${e.message}</p></div>`;
  }
}
init();
