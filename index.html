<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d12">
<title>Life OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d12;--surface:#161620;--card:#1c1c28;--card-hover:#242432;--border:rgba(255,255,255,0.06);--text:#f0ede8;--text-secondary:#a09a92;--muted:#5e5a54;--input-bg:#161620;
--green:#6bc9a0;--green-dim:rgba(107,201,160,0.10);--green-glow:rgba(107,201,160,0.15);
--blue:#5b9bd5;--blue-dim:rgba(91,155,213,0.10);
--pink:#e07ea8;--pink-dim:rgba(224,126,168,0.10);--pink-glow:rgba(224,126,168,0.12);
--orange:#e0a050;--orange-dim:rgba(224,160,80,0.10);
--red:#e06060;--red-dim:rgba(224,96,96,0.10);
--purple:#9b8ec4;--purple-dim:rgba(155,142,196,0.10);
--r-xl:24px;--r-md:14px;--r-sm:10px;--r-pill:50px;
--shadow-card:0 2px 8px rgba(0,0,0,0.2),0 1px 2px rgba(0,0,0,0.15);
--font-display:'Space Grotesk',sans-serif;--font-body:'DM Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.m{font-family:var(--font-display)}
.hero{padding:40px 16px 16px;text-align:center;position:relative}
.hero::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(circle,var(--green-glow) 0%,transparent 70%);pointer-events:none;opacity:0.4}
.hero-time{font-family:var(--font-display);font-size:54px;font-weight:700;letter-spacing:-3px;line-height:1;position:relative;z-index:1}
.hero-date{font-size:13px;color:var(--text-secondary);margin-top:8px;font-weight:500;position:relative;z-index:1}
.hero-sub{font-size:12px;color:var(--green);margin-top:8px;font-weight:600;position:relative;z-index:1}
.page{max-width:420px;margin:0 auto;padding:0 16px 90px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(22,22,32,0.88);border-top:1px solid var(--border);display:flex;justify-content:center;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));z-index:100;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%)}
.bottom-nav-inner{display:flex;gap:0;max-width:420px;width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;cursor:pointer;color:var(--muted);transition:color .15s ease;font-family:var(--font-body)}
.nav-btn:active{transform:scale(0.92)}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:600;letter-spacing:0.5px}
.tabs{display:none}
.s{display:none}.s.a{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.c{background:var(--card);border-radius:var(--r-xl);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-card);border:1px solid var(--border)}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-family:var(--font-display)}
.r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.r:last-of-type{border-bottom:none}
.rl{display:flex;align-items:center;gap:10px}
.d{width:7px;height:7px;border-radius:50%}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:var(--font-display)}
.val{font-size:18px;font-weight:700}
.icon-box{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.alert-danger{background:var(--red-dim);color:var(--red)}
.alert-warning{background:var(--orange-dim);color:var(--orange)}
.alert-ok{background:var(--green-dim);color:var(--green)}
.alert-money{background:var(--orange-dim);color:var(--orange)}
.stale-warning{background:var(--red-dim);border:1px solid rgba(224,96,96,0.15);border-radius:var(--r-md);padding:10px;margin-top:10px;font-size:11px;color:var(--red);line-height:1.5}
.jah-accent{color:var(--pink)}
.jah-bg{background:linear-gradient(145deg,rgba(224,126,168,0.08) 0%,rgba(91,155,213,0.06) 100%)}
.jah-border{border:1px solid rgba(224,126,168,0.1);box-shadow:var(--shadow-card),0 0 40px var(--pink-glow)}
.log-entry{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.log-entry:last-of-type{border-bottom:none}
.empty-state{text-align:center;padding:14px 0 2px;font-size:11px;color:var(--muted);font-style:italic}
.pills{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.pills::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-pill);font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--border);background:var(--surface)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill-dot.live{animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:0.4}}
.family-status{display:flex;justify-content:center;gap:16px;margin-bottom:20px;padding:0 8px}
.fam-member{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-md);background:var(--surface);border:1px solid var(--border);min-width:0;flex:1;max-width:160px}
.fam-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fam-info{min-width:0;overflow:hidden}
.fam-name{font-size:10px;font-weight:700;font-family:var(--font-display);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fam-status{font-size:9px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fam-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;animation:pulseDot 2s infinite}
.profile-sw{display:flex;gap:8px;margin-bottom:20px;justify-content:center}
.prof-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 16px;border-radius:var(--r-md);border:2px solid transparent;background:var(--surface);cursor:pointer;transition:all .15s ease;min-width:72px;font-family:var(--font-body);font-size:10px;font-weight:600;color:var(--text-secondary)}
.prof-btn:active{transform:scale(0.95)}
.prof-btn.a{border-color:var(--green);background:var(--green-dim);color:var(--text)}
.prof-btn.a-belle{border-color:var(--pink);background:var(--pink-dim);color:var(--text)}
.prof-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.fab{position:fixed;bottom:72px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--green);color:#0d0d12;border:none;font-size:26px;font-weight:700;cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(107,201,160,.35);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}
.ql-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1500;display:none;align-items:flex-end;justify-content:center}
.ql-overlay.open{display:flex}
.ql-sheet{width:100%;max-width:420px;max-height:85vh;background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px 32px;overflow-y:auto;animation:slideUp .25s ease;border:1px solid var(--border);border-bottom:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ql-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ql-header h3{font-size:16px;font-weight:700;font-family:var(--font-display)}
.ql-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.ql-cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.ql-cat{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-pill);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.ql-cat.a{background:var(--green);color:#0d0d12;border-color:var(--green)}
.ql-form{display:none}.ql-form.a{display:block}
.ql-field{margin-bottom:14px}
.ql-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-family:var(--font-display)}
.ql-field input,.ql-field select{width:100%;padding:12px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
.ql-field input:focus,.ql-field select:focus{border-color:var(--green)}
.ql-toggle{display:flex;gap:6px}
.ql-toggle button{flex:1;padding:12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.ql-toggle button.a{background:var(--green);color:#0d0d12;border-color:var(--green)}
.ql-submit{width:100%;padding:14px;background:var(--green);color:#0d0d12;border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.ql-submit:disabled{opacity:.4;cursor:not-allowed}
.ql-done{text-align:center;padding:32px 0}
.ql-done .check{font-size:48px;margin-bottom:8px}
.ql-done p{color:var(--muted);font-size:13px}
.weather-rec-moto{background:var(--green-dim);border:1px solid rgba(107,201,160,.2);color:var(--green);border-radius:var(--r-sm)}
.weather-rec-early{background:var(--orange-dim);border:1px solid rgba(224,160,80,.2);color:var(--orange);border-radius:var(--r-sm)}
.weather-rec-car{background:var(--red-dim);border:1px solid rgba(224,96,96,.2);color:var(--red);border-radius:var(--r-sm)}
.loader-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
.loader-screen.hide{opacity:0;pointer-events:none}
.loader-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin:0 4px;animation:pulse 1.2s infinite}
.loader-dot:nth-child(2){animation-delay:.2s}
.loader-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1400;display:none;align-items:flex-end;justify-content:center}
.more-overlay.open{display:flex}
.more-sheet{width:100%;max-width:420px;background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px 32px;animation:slideUp .2s ease;border:1px solid var(--border);border-bottom:none}
.more-btn{display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:none;background:var(--surface);border-radius:var(--r-md);color:var(--text);font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:background .15s}
.more-btn:active{background:var(--card-hover)}
.more-icon{font-size:20px;width:32px;text-align:center}
</style>
</head>
<body>

<div class="loader-screen" id="loader">
  <div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-family:var(--font-display);letter-spacing:1px">LIFE OS</div>
  <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-time" id="live-clock"></div>
  <div class="hero-date" id="header-date"></div>
  <div class="hero-sub" id="header-sub"></div>
  <div style="display:none"><span id="dash-label"></span><span id="status-dot"></span></div>
</div>

<div class="page">

<!-- FAMILY STATUS BAR -->
<div class="family-status" id="family-status"></div>

<!-- PROFILE TOGGLE -->
<div class="profile-sw">
  <button class="prof-btn a" id="prof-ra" onclick="setProfile('ra')"><div class="prof-avatar" style="background:var(--blue-dim)">&#128104;</div>RA</button>
  <button class="prof-btn" id="prof-belle" onclick="setProfile('arabelle')"><div class="prof-avatar" style="background:var(--pink-dim)">&#128105;</div>Arabelle</button>
</div>

<div class="tabs" id="tab-bar"></div>

<div class="cnt" style="padding:0">
  <div class="s a" id="ov"></div>
  <div class="s" id="jh"></div>
  <div class="s" id="tr"></div>
  <div class="s" id="tl"></div>
  <div class="s" id="sm"></div>
  <div class="s" id="lg"></div>
  <div class="s" id="ex"></div>
</div>

<div style="text-align:center;padding:20px 0 16px">
  <span class="m" style="font-size:9px;color:var(--muted)" id="footer"></span>
</div>

</div><!-- /page -->

<!-- MORE MENU -->
<div class="more-overlay" id="more-overlay" onclick="if(event.target===this)closeMore()">
  <div class="more-sheet">
    <div style="width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px"></div>
    <button class="more-btn" onclick="navTo('tl');closeMore()"><span class="more-icon">&#128200;</span>Timeline</button>
    <button class="more-btn" onclick="navTo('sm');closeMore()"><span class="more-icon">&#128240;</span>News</button>
    <button class="more-btn" onclick="navTo('lg');closeMore()"><span class="more-icon">&#128221;</span>Log</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn active" id="nav-ov" onclick="navTo('ov')"><span class="nav-icon">&#127968;</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" id="nav-tr" onclick="navTo('tr')"><span class="nav-icon">&#9992;</span><span class="nav-label">Trip</span></button>
    <button class="nav-btn" id="nav-ex" onclick="navTo('ex')"><span class="nav-icon">&#128176;</span><span class="nav-label">Money</span></button>
    <button class="nav-btn" id="nav-more" onclick="openMore()"><span class="nav-icon">&#8943;</span><span class="nav-label">More</span></button>
  </div>
</nav>

<button class="fab" onclick="openQL()">+</button>

<div class="ql-overlay" id="ql-overlay" onclick="if(event.target===this)closeQL()">
  <div class="ql-sheet" id="ql-sheet">
    <div class="ql-header"><h3 id="ql-title">Quick Log</h3><button class="ql-close" onclick="closeQL()">&times;</button></div>
    <div class="ql-cats" id="ql-cats">
      <button class="ql-cat a" onclick="setQL('diaper')">Diaper</button>
      <button class="ql-cat" onclick="setQL('feeding')">Feeding</button>
      <button class="ql-cat" onclick="setQL('transaction')">Transaction</button>
      <button class="ql-cat" onclick="setQL('balance')">Balance</button>
      <button class="ql-cat" onclick="setQL('activity')">Activity</button>
      <button class="ql-cat" onclick="setQL('sleep')">Sleep</button>
    </div>
    <div id="ql-forms">
      <div class="ql-form a" id="ql-diaper">
        <div class="ql-field"><label>Type</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-diaper-type')">Wet</button><button onclick="qlToggle(this,'ql-diaper-type')">Poop</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-diaper-notes" placeholder="e.g. semi-hard, after lunch"></div>
        <input type="hidden" id="ql-diaper-type" value="wet">
      </div>
      <div class="ql-form" id="ql-feeding">
        <div class="ql-field"><label>Food</label><input type="text" id="ql-feeding-food" placeholder="e.g. Lugaw + Egg, Milk"></div>
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-feeding-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-feeding-who')">RA</button><button onclick="qlToggle(this,'ql-feeding-who')">Arabelle</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-feeding-notes" placeholder="e.g. ate well, only half"></div>
        <input type="hidden" id="ql-feeding-who" value="Baby Jah">
      </div>
      <div class="ql-form" id="ql-transaction">
        <div class="ql-field"><label>Amount (P)</label><input type="number" id="ql-tx-amount" placeholder="0"></div>
        <div class="ql-field"><label>Description</label><input type="text" id="ql-tx-desc" placeholder="e.g. Parking, Lugaw"></div>
        <div class="ql-field"><label>Category</label><select id="ql-tx-cat"><option value="food">Food</option><option value="transport">Transport</option><option value="shopping">Shopping</option><option value="load">Load</option><option value="transfer">Transfer</option></select></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-tx-notes" placeholder=""></div>
      </div>
      <div class="ql-form" id="ql-balance">
        <div class="ql-field"><label>Account</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-bal-acct')">Payroll</button><button onclick="qlToggle(this,'ql-bal-acct')">Savings</button><button onclick="qlToggle(this,'ql-bal-acct')">Pocket Cash</button></div></div>
        <div class="ql-field"><label>New Balance (P)</label><input type="number" id="ql-bal-amount" placeholder="0"></div>
        <input type="hidden" id="ql-bal-acct" value="payroll">
      </div>
      <div class="ql-form" id="ql-activity">
        <div class="ql-field"><label>Activity</label><input type="text" id="ql-act-desc" placeholder="e.g. Morning walk, Watching Miss Rachel"></div>
      </div>
      <div class="ql-form" id="ql-sleep">
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-sleep-who')">RA</button></div></div>
        <div class="ql-field"><label>Action</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-action')">Slept</button><button onclick="qlToggle(this,'ql-sleep-action')">Woke</button></div></div>
        <div class="ql-field"><label>Time</label><input type="time" id="ql-sleep-time"></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-sleep-notes" placeholder="e.g. Post-shift nap"></div>
        <input type="hidden" id="ql-sleep-who" value="Baby Jah">
        <input type="hidden" id="ql-sleep-action" value="slept">
      </div>
    </div>
    <button class="ql-submit" id="ql-submit" onclick="submitQL()">Log It</button>
    <div class="ql-done" id="ql-done" style="display:none"><div class="check">&#10003;</div><p>Logged!</p></div>
  </div>
</div>

<script>
// === NAV ===
function navTo(id){
  document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));
  document.getElementById(id).classList.add('a');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navBtn=document.getElementById('nav-'+id);
  if(navBtn)navBtn.classList.add('active');
  // For "more" items (tl, sm, lg), highlight the more button
  if(['tl','sm','lg'].includes(id)){document.getElementById('nav-more').classList.add('active')}
  currentTabIdx=TAB_IDS.indexOf(id);
  ensureTabRendered(id);
}
function openMore(){document.getElementById('more-overlay').classList.add('open')}
function closeMore(){document.getElementById('more-overlay').classList.remove('open')}
function updateStatusPills(){
  if(!D)return;
  const ra=getRAStatus();const ara=getArabelleStatus();const jah=jahStatus();
  document.getElementById('family-status').innerHTML=`
    <div class="fam-member">
      <div class="fam-avatar" style="background:var(--blue-dim)">&#128104;</div>
      <div class="fam-info">
        <div class="fam-name">RA</div>
        <div class="fam-status"><span class="fam-dot" style="background:${ra.color}"></span> ${ra.text}</div>
      </div>
    </div>
    <div class="fam-member">
      <div class="fam-avatar" style="background:var(--pink-dim)">&#128118;</div>
      <div class="fam-info">
        <div class="fam-name">Bujah</div>
        <div class="fam-status"><span class="fam-dot" style="background:var(--pink)"></span> ${jah.text}</div>
      </div>
    </div>
    <div class="fam-member">
      <div class="fam-avatar" style="background:var(--pink-dim)">&#128105;</div>
      <div class="fam-info">
        <div class="fam-name">Arabelle</div>
        <div class="fam-status"><span class="fam-dot" style="background:${ara.color}"></span> ${ara.text}</div>
      </div>
    </div>`;
}
function toggleTheme(){}

// === GLOBALS ===
let D=null, W=null, PROFILE='ra';
let balHidden=localStorage.getItem('balHidden')==='true';
function toggleBal(){balHidden=!balHidden;localStorage.setItem('balHidden',balHidden);if(PROFILE==='ra')renderRAHome();else renderArabelleHome();renderedTabs['ov']=true;if(renderedTabs['ex']){renderExpenses();renderedTabs['ex']=true}}

// === PHT UTILITIES ===
// Use Date.now() for all calculations (UTC-based, no timezone bugs)
// Use Intl for display only
function manilaHour(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',hour:'numeric',hour12:false}))}
function manilaMinute(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',minute:'numeric'}))}
function manilaDayNum(){return new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'narrow'})==='S'?((new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'})==='Sunday')?0:6):['Monday','Tuesday','Wednesday','Thursday','Friday'].indexOf(new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'}))+1}
function manilaDateStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})}
function fmt(n){return n==null?'--':'P'+n.toLocaleString()}
function fmt12(t){if(!t)return'';let s=typeof t==='string'?t:String(t);s=s.replace(/[^\d:]/g,'');const parts=s.match(/^(\d{1,2}):(\d{2})/);if(!parts)return'';const h=parseInt(parts[1]),m=parseInt(parts[2]);const ampm=h>=12?'PM':'AM';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ampm}
function fmtDate(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const parts=d.split('-');return m[parseInt(parts[1])-1]+' '+parseInt(parts[2])}
function isStale(d,days){if(!d)return true;return(Date.now()-new Date(d+'T00:00:00+08:00').getTime())>days*86400000}
function timeAgo(d,t){if(!d)return null;let tStr=t||'12:00';if(typeof tStr!=='string')tStr=String(tStr);tStr=tStr.replace(/[^\d:]/g,'');if(tStr.length===1||tStr.length===2)tStr=tStr+':00';if(!tStr.match(/^\d{1,2}:\d{2}/))tStr='12:00';const parts=tStr.match(/^(\d{1,2}):(\d{2})/);if(!parts)return null;const clean=parts[1].padStart(2,'0')+':'+parts[2];const then=new Date(d+'T'+clean+':00+08:00');if(isNaN(then.getTime()))return null;const diff=Date.now()-then.getTime();if(diff<0)return 'just now';const mins=Math.floor(diff/60000);if(mins<60)return mins+'m ago';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';const days=Math.floor(hrs/24);return days+'d ago'}
function daysUntil(d){const today=manilaDateStr();const todayMs=new Date(today+'T00:00:00+08:00').getTime();const thenMs=new Date(d+'T00:00:00+08:00').getTime();const diff=Math.round((thenMs-todayMs)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff<0)return Math.abs(diff)+'d ago';return 'in '+diff+' days'}

function isOnTrip(){
  if(!D||!D.shared.trips)return false;
  return D.shared.trips.some(t=>t.status==='active');
}
function getActiveTrip(){
  if(!D||!D.shared.trips)return null;
  return D.shared.trips.find(t=>t.status==='active');
}
function getRAStatus(){
  if(isOnTrip()){const t=getActiveTrip();return{text:t?t.destination:'On vacation',icon:'🌴',color:'#6bc9a0'}}
  const h=manilaHour();const m=manilaMinute();const day=manilaDayNum();
  const isWorkDay=day>=1&&day<=5&&!isHoliday(manilaDateStr());
  if(!isWorkDay)return{text:'Home (rest day)',icon:'🏠',color:'#6bc9a0'};
  if(h>=20||h<4)return{text:'At work',icon:'💼',color:'#5b9bd5'};

  if(h>=12&&h<19)return{text:'Home (awake)',icon:'🏠',color:'#6bc9a0'};
  if(h>=19&&h<20)return{text:'Getting ready for work',icon:'👔',color:'#e0a050'};
  return{text:'Home',icon:'🏠',color:'#6bc9a0'};
}

function getArabelleStatus(){
  if(isOnTrip()){const t=getActiveTrip();return{text:t?t.destination:'On vacation',icon:'🌴',color:'#e07ea8'}}
  const h=manilaHour();const day=manilaDayNum();
  if(day===0||day===6||isHoliday(manilaDateStr()))return{text:'Rest day',icon:'🏠',color:'#6bc9a0'};
  if(day===1||day===5){

// === HOLIDAYS ===
let HOLIDAYS=[];
async function fetchHolidays(){
  try{
    const year=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).split('-')[0];
    const cacheKey='holidays_'+year;
    const cached=localStorage.getItem(cacheKey);
    if(cached){const c=JSON.parse(cached);if(c.ts&&Date.now()-c.ts<86400000){HOLIDAYS=c.data;return}}
    const res=await fetchWithTimeout(`https://date.nager.at/api/v3/PublicHolidays/${year}/PH`,{},3000);
    HOLIDAYS=await res.json();
    localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),data:HOLIDAYS}));
  }catch(e){
    const year=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).split('-')[0];
    const cached=localStorage.getItem('holidays_'+year);
    if(cached){try{HOLIDAYS=JSON.parse(cached).data||[]}catch(_){HOLIDAYS=[]}}else{HOLIDAYS=[]}
  }
}
function getTodayHoliday(){
  const today=manilaDateStr();
  const h=HOLIDAYS.find(h=>h.date===today);
  return h?h.name:null;
}
function isHoliday(dateStr){
  return HOLIDAYS.some(h=>h.date===dateStr);
}
function getUpcomingHoliday(){
  const today=manilaDateStr();
  return HOLIDAYS.find(h=>h.date>=today)||null;
}

// === WEATHER ===
async function fetchWeather(lat,lon){
  try{
    const cacheKey='weather_'+lat+'_'+lon;
    const cached=localStorage.getItem(cacheKey);
    if(cached){const c=JSON.parse(cached);if(c.ts&&Date.now()-c.ts<1800000){return c.data}}
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability,weathercode&timezone=Asia%2FManila&forecast_days=2`;
    const res=await fetchWithTimeout(url,{},3000);
    const data=await res.json();
    localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),data}));
    return data;
  }catch(e){
    const cacheKey='weather_'+lat+'_'+lon;
    const cached=localStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached).data}catch(_){}}
    return null;
  }
}

function getCommuteWeather(weather,hour,dayOffset){
  if(!weather||!weather.hourly)return null;
  const idx=dayOffset*24+hour;
  if(idx>=weather.hourly.time.length)return null;
  return{
    time:weather.hourly.time[idx],
    rain:weather.hourly.precipitation_probability[idx],
    code:weather.hourly.weathercode[idx]
  };
}

function getCommuteRec(rain,code){
  if(rain>=60||code>=63)return{text:'Book a car (Grab/InDrive)',cls:'weather-rec-car',icon:'🚗'};
  if(rain>=30||code>=51)return{text:'Book mototaxi early, bring umbrella',cls:'weather-rec-early',icon:'☂️'};
  return{text:'Mototaxi is fine',cls:'weather-rec-moto',icon:'🏍'};
}

        insight=fmt(pendingTotal)+' in pending bills. '+fmt(total-pendingTotal)+' free after.';color='var(--text-secondary)';
      }else{
        insight='All bills paid. '+fmt(total)+' available. Looking good.';color='var(--green)';
      }
      return '<div style="margin-top:12px;padding:10px 12px;background:var(--surface);border-radius:var(--r-md);font-size:12px;color:'+color+';line-height:1.5">'+insight+'</div>';
    })()}
    </div>`;

  // Gas -- show Vios during trip, scooter otherwise
  if(isOnTrip()&&S.vehicle.car){
    const car=S.vehicle.car;
    const carGas=parseInt(car.gas_level)||0;
    const barColor=carGas<30?'var(--red)':carGas<60?'var(--orange)':'var(--green)';
    h+=`<div class="c">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="lbl m">${car.model}</div><div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${car.last_gas?'Filled: '+fmtDate(car.last_gas):''} ${car.notes?'// '+car.notes:''}</div></div>
        <div style="font-family:var(--font-display);font-size:28px;font-weight:700;color:${barColor}">${car.gas_level}</div>
      </div>
      <div style="height:6px;background:var(--surface);border-radius:3px;margin-top:12px;overflow:hidden"><div style="height:100%;width:${carGas}%;background:${barColor};border-radius:3px;transition:width .4s ease"></div></div></div>`;
  }else{
    const gas=S.vehicle.scooter;
    const gasLevel=parseInt(gas.gas_level)||0;
    const gasColor=gasLevel<30?'var(--red)':gasLevel<60?'var(--orange)':'var(--green)';
    h+=`<div class="c">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div class="lbl m">Scooter Gas</div><div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${gas.last_gas?'Last: '+fmtDate(gas.last_gas):''}</div></div>
        <div style="font-family:var(--font-display);font-size:28px;font-weight:700;color:${gasColor}">${gas.gas_level}</div>
      </div>
      <div style="height:6px;background:var(--surface);border-radius:3px;margin-top:12px;overflow:hidden"><div style="height:100%;width:${gasLevel}%;background:${gasColor};border-radius:3px;transition:width .4s ease"></div></div></div>`;
  }

  // Low cash warning
  if((S.accounts.pocket_cash.balance||0)<500){
    h+=`<div class="stale-warning">Pocket cash is low: <span class="m" style="font-weight:700">${fmt(S.accounts.pocket_cash.balance)}</span>. Withdraw before the trip.</div>`;
  }

  // RA Meals
  const raMeals=P.transactions.filter(t=>t.category==='food').slice(-4).reverse();
  if(raMeals.length){
    h+='<div class="c"><div class="lbl m">My Meals</div>';
    raMeals.forEach(t=>{
      h+=`<div class="log-entry"><div class="icon-box" style="background:#10b98118;font-size:13px">🍽</div>
        <div style="flex:1"><span style="font-size:13px">${t.description}</span></div>
        <span class="m" style="font-size:10px;color:#64748b">${fmt12(t.time)||''} ${timeAgo(t.date,t.time)||''}</span></div>`;
    });h+='</div>';
  }

  // Events
  if(nextEvents.length){
    h+='<div class="c"><div class="lbl m">Next Up</div>';
    nextEvents.forEach((e,i)=>{
      h+=`<div style="display:flex;gap:12px;align-items:center;${i>0?'margin-top:12px':'margin-top:6px'}">
        <div class="icon-box" style="background:${catIcons[e.category]}20">${catEmoji[e.category]||'📌'}</div>
        <div style="flex:1"><div style="font-size:15px;font-weight:600">${e.title}</div><div class="m" style="font-size:11px;color:#64748b">${fmtDate(e.date)}${e.time?' // '+fmt12(e.time):''}</div></div>
        <span class="m" style="font-size:10px;color:${catIcons[e.category]}">${daysUntil(e.date)}</span></div>`;
    });h+='</div>';
  }

  // Todos
  if(pendingTodos.length){
    h+='<div class="c"><div class="lbl m">To Do</div><div style="margin-top:6px">';
    pendingTodos.forEach((t,i)=>{
      const border=i<pendingTodos.length-1?'border-bottom:1px solid #1e293b':'';
      const dueTag=t.due?`<span class="m" style="font-size:9px;color:#64748b;margin-left:8px">${daysUntil(t.due)}</span>`:'';
      h+=`<div style="display:flex;gap:10px;align-items:center;padding:8px 0;${border};cursor:pointer" onclick="tickTodo(${i})"><div style="width:18px;height:18px;border-radius:4px;border:2px solid #64748b;flex-shrink:0;display:flex;align-items:center;justify-content:center" id="todo-check-${i}"></div><span style="font-size:14px" id="todo-text-${i}">${t.text}${dueTag}</span></div>`;
    });h+='</div></div>';
  }

  // Contacts (dismissable)
  const dismissedContacts=JSON.parse(localStorage.getItem('dismissedContacts')||'[]');
  const visibleContacts=contacts.filter(c=>!dismissedContacts.includes(c.name));
  if(visibleContacts.length){
    h+='<div class="c"><div class="lbl m">Need to Contact</div><div style="margin-top:6px">';
    visibleContacts.forEach(c=>{
      h+=`<div class="r"><div class="rl">
        <button onclick="dismissContact('${c.name.replace(/'/g,"\\'")}')" style="background:none;border:1px solid var(--border);border-radius:4px;width:20px;height:20px;cursor:pointer;color:var(--muted);font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#10003;</button>
        <div><div style="font-size:14px;font-weight:500">${c.name}</div><div class="m" style="font-size:11px;color:#64748b">${c.purpose}${c.due?' // '+fmtDate(c.due):''}</div></div></div>
        ${c.due?`<span class="m" style="font-size:10px;color:#a78bfa">${daysUntil(c.due)}</span>`:''}</div>`;
    });h+='</div></div>';
  }

  if(isStale(S.accounts.payroll.updated,7))h+=`<div class="stale-warning">Account balances haven't been updated in 7+ days. Send a bank screenshot to refresh.</div>`;
  el.innerHTML=h;
}

        <div style="flex:1"><div style="font-size:13px;font-weight:600">${sleepLabel}</div><div class="m" style="font-size:10px;color:#64748b">${lastSleep&&lastSleep.notes?lastSleep.notes:''}</div></div>

      <div class="log-entry" style="border-bottom:1px solid rgba(244,114,182,.1)"><div class="icon-box" style="background:rgba(34,211,238,.1);font-size:13px">🏃</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${lastAct?lastAct.activity:'--'}</div><div class="m" style="font-size:10px;color:#64748b">Last activity</div></div>
        <div style="text-align:right"><div style="font-size:12px;font-weight:600">${lastAct?timeAgo(lastAct.date,lastAct.time):'--'}</div><div class="m" style="font-size:10px;color:#64748b">${lastAct?fmt12(lastAct.time):''}</div></div></div>

    h+='<div class="c"><div class="lbl m">Bills Due</div>';
    pendingBills.forEach(b=>{
      h+=`<div class="r"><div class="rl"><div class="d" style="background:#f59e0b"></div><span style="font-size:13px">${b.name}</span></div>

    });h+='</div>';
  }

  // Next family event
  const nextEvent=S.calendar.filter(e=>new Date(e.date+'T23:59:59+08:00')>=new Date())[0];
  if(nextEvent){
    h+=`<div class="c"><div class="lbl m">Coming Up</div>
      <div style="display:flex;gap:12px;align-items:center;margin-top:6px">
        <div class="icon-box" style="background:${catIcons[nextEvent.category]}20">${catEmoji[nextEvent.category]||'📌'}</div>
        <div style="flex:1"><div style="font-size:15px;font-weight:600">${nextEvent.title}</div><div class="m" style="font-size:11px;color:#64748b">${fmtDate(nextEvent.date)} // ${daysUntil(nextEvent.date)}</div></div>
      </div></div>`;
  }

  el.innerHTML=h;
}

function jahStatus(){
  const jah=D.shared.baby_jah;if(!jah)return{icon:'👶',text:'No data',sub:''};
  const toMin=(d,t)=>{if(!d||!t)return-Infinity;const[h,m]=(t||'0:0').split(':').map(Number);return(new Date(d+'T00:00:00+08:00').getTime()/60000)+h*60+m};
  const nowMin=Date.now()/60000;
  const ago=m=>{const d=nowMin-m;if(d<1)return'just now';if(d<60)return Math.round(d)+'m ago';if(d<1440)return Math.round(d/60)+'h ago';return Math.round(d/1440)+'d ago'};
  // Find most recent event across all categories
  const events=[];
  (jah.feeding||[]).forEach(f=>events.push({type:'fed',min:toMin(f.date,f.time),label:f.food,time:f.time}));
  (jah.sleep||[]).forEach(s=>{
    if(s.slept)events.push({type:'slept',min:toMin(s.date,s.slept),label:s.type,time:s.slept});
    if(s.woke)events.push({type:'woke',min:toMin(s.date,s.woke),label:s.type,time:s.woke});
  });
  (jah.diapers||[]).forEach(d=>events.push({type:'diaper',min:toMin(d.date,d.time),label:d.type,time:d.time}));
  (jah.activities||[]).forEach(a=>events.push({type:'activity',min:toMin(a.date,a.time),label:a.activity,time:a.time}));
  events.sort((a,b)=>b.min-a.min);
  if(!events.length)return{icon:'👶',text:'No data yet',sub:''};
  const latest=events[0];const sinceMin=nowMin-latest.min;
  const lastFed=events.find(e=>e.type==='fed');const sinceFed=lastFed?(nowMin-lastFed.min):Infinity;
  const lastSlept=events.find(e=>e.type==='slept');
  const lastWoke=events.find(e=>e.type==='woke');
  // Determine status
  if(latest.type==='slept'){return{icon:'😴',text:'Sleeping',sub:ago(latest.min)+' ('+fmt12(latest.time)+')'};}
  if(latest.type==='woke'){
    if(sinceFed>120)return{icon:'🥱',text:'Just woke up -- probably hungry',sub:ago(latest.min)};
    if(sinceMin<30)return{icon:'🥱',text:'Just woke up',sub:ago(latest.min)};
  }
  if(latest.type==='fed'){
    if(sinceMin<30)return{icon:'🍼',text:'Just ate '+latest.label,sub:fmt12(latest.time)};
    if(sinceMin<90)return{icon:'😊',text:'Fed -- '+latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='activity'){
    if(latest.label.toLowerCase().includes('bath'))return{icon:'🛁',text:'Fresh from bath',sub:fmt12(latest.time)};
    if(sinceMin<60)return{icon:'🏃',text:latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='diaper'){
    if(sinceMin<15)return{icon:'🧷',text:'Just had a diaper change',sub:fmt12(latest.time)};
  }
  // Fallback: check hunger
  if(sinceFed>180)return{icon:'😐',text:'Might be hungry soon',sub:'Last fed '+ago(lastFed.min)};
  if(sinceFed>90)return{icon:'😊',text:'Playing/awake',sub:'Last fed '+ago(lastFed.min)};
  return{icon:'😊',text:'Doing good',sub:ago(latest.min)};
}

function renderTimeline(){
  const el=document.getElementById('tl');
  const tlIcons={photo:'\ud83d\udcf7',screenshot:'\ud83d\udcf1',transaction:'\ud83d\udcb3',balance:'\ud83c\udfe6',food:'\ud83c\udf7d',activity:'\ud83c\udfc3',document:'\ud83d\udcc4',event:'\ud83d\udcc5'};
  const tagColors={baby_jah:'#f472b6',arabelle:'#a78bfa',food:'#f59e0b',work:'#22d3ee',home:'#10b981',money:'#f59e0b',health:'#ef4444',errands:'#64748b',tech:'#22d3ee',social:'#818cf8',duberymnl:'#22d3ee'};
  const cutoff=new Date(Date.now()-7*86400000);
  // Merge life timeline + calendar events
  const items=[];
  (D.timeline||[]).forEach(e=>{if(new Date(e.date+'T23:59:59+08:00')>=cutoff)items.push({...e,src:'life'})});
  const now=new Date(Date.now()+8*3600000);
  (D.shared.calendar||[]).filter(e=>{const d=new Date(e.date+'T23:59:59+08:00');return d>=cutoff&&d<=now}).forEach(e=>{items.push({date:e.date,time:e.time||'00:00',type:'event',summary:e.title,tags:[e.category||'event'],src:'cal'})});
  items.sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  // Group by date
  const grouped={};items.forEach(e=>{(grouped[e.date]=grouped[e.date]||[]).push(e)});
  const today=new Date(Date.now()+8*3600000).toISOString().slice(0,10);
  const yesterday=new Date(Date.now()+8*3600000-86400000).toISOString().slice(0,10);
  const dayLabel=d=>{if(d===today)return'Today';if(d===yesterday)return'Yesterday';const dt=new Date(d+'T12:00:00+08:00');return dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'})};

  let h='';
  if(items.length===0){h='<div class="c"><div class="empty-state">No timeline entries yet. Life log will appear here as photos and screenshots are processed.</div></div>';el.innerHTML=h;return}

  Object.keys(grouped).sort().reverse().forEach(date=>{
    h+=`<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;padding:12px 0 6px;border-bottom:1px solid var(--border);margin-bottom:4px;text-transform:uppercase" class="m">${dayLabel(date)}</div>`;
    grouped[date].sort((a,b)=>(b.time||'').localeCompare(a.time||'')).forEach(e=>{
      const icon=tlIcons[e.type]||'\ud83d\udccc';
      const timeStr=e.time&&e.time!=='00:00'?`<span class="m" style="min-width:52px;text-align:right;font-size:10px;color:var(--muted)">${e.time.replace(/^(\d{2}):(\d{2})$/,(m,hh,mm)=>{const h12=((+hh%12)||12);return h12+':'+ mm+(+hh<12?' AM':' PM')})}</span>`:'<span style="min-width:52px"></span>';
      const tags=(e.tags||[]).map(t=>`<span class="m" style="display:inline-block;padding:2px 6px;border-radius:10px;font-size:9px;margin-right:4px;margin-top:4px;background:${(tagColors[t]||'#64748b')}22;color:${tagColors[t]||'#64748b'}">${t}</span>`).join('');
      const countdown=e.countdown?`<span class="m" style="font-size:9px;color:var(--muted);white-space:nowrap;margin-left:8px">${e.countdown}</span>`:'';
      h+=`<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">${timeStr}<span style="font-size:16px;flex-shrink:0;width:24px;text-align:center">${icon}</span><div style="flex:1"><div style="font-size:13px;line-height:1.4">${e.summary}</div>${tags?'<div>'+tags+'</div>':''}</div>${countdown}</div>`;
    });
  });
  el.innerHTML=h;
}

// === MERGE SHEET DATA ===
function mergeSheetData(D,rows){
  if(!rows||!rows.length)return;
  const today=manilaDateStr();
  for(const r of rows){
    // Normalize date/time -- Google Sheets returns ISO Date objects
    let date=r.date||today;
    let time=r.time||'00:00';
    // Date: "2026-03-24T00:00:00.000Z" -> "2026-03-24"
    date=String(date);
    if(date.includes('T'))date=date.split('T')[0];
    if(!date.match(/^\d{4}-\d{2}-\d{2}$/))date=today;
    // Time: "1899-12-30T14:36:00.000Z" -> "14:36"
    time=String(time);
    if(time.includes('T')){
      const tMatch=time.match(/T(\d{2}):(\d{2})/);
      time=tMatch?(tMatch[1]+':'+tMatch[2]):'00:00';
    }
    time=time.replace(/[^\d:]/g,'');
    if(!time.match(/^\d{1,2}:\d{2}/))time='00:00';
    const ts=r.timestamp||'';
    switch(r.category){
      case 'diaper':{
        const dtype=(r.detail_1||'wet').toString().toLowerCase();
        if(!D.shared.baby_jah.diapers.some(d=>d.date===date&&d.time===time&&d.type===dtype)){
          D.shared.baby_jah.diapers.push({date,time,type:dtype,notes:r.notes||''});
        }}break;
      case 'feeding':{
        if(!r.detail_1||!r.detail_1.toString().trim())break;
        const feedWho=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(feedWho==='baby jah'){
          if(!D.shared.baby_jah.feeding.some(f=>f.date===date&&f.time===time&&f.food===r.detail_1)){
            D.shared.baby_jah.feeding.push({date,time,food:r.detail_1||'',notes:r.notes||''});
          }
        }else{
          const tgt=feedWho==='arabelle'?D.arabelle:D.ra;
          if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
            tgt.transactions.push({date,time,description:r.detail_1||'',amount:null,category:'food'});
          }
        }}break;
      case 'transaction':{
        const who=(r.logged_by||'RA').toLowerCase();
        const tgt=who==='arabelle'?D.arabelle:D.ra;
        if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
          tgt.transactions.push({date,time,description:r.detail_1||'',amount:r.amount?parseFloat(r.amount):null,category:r.detail_2||'shopping'});
        }}break;
      case 'balance':{
        const acct=(r.detail_1||'').toLowerCase().replace(/ /g,'_');
        if(D.shared.accounts[acct]){
          D.shared.accounts[acct].balance=parseFloat(r.amount)||0;
          D.shared.accounts[acct].updated=date;
        }}break;
      case 'activity':
        if(!D.shared.baby_jah.activities.some(a=>a.date===date&&a.time===time&&a.activity===r.detail_1)){
          D.shared.baby_jah.activities.push({date,time,activity:r.detail_1||''});
        }break;
      case 'sleep':{
        const action=(r.detail_1||'slept').toString().toLowerCase();
        let sleepTime=r.detail_2||time;
        sleepTime=String(sleepTime);if(sleepTime.includes('T')){const sm=sleepTime.match(/T(\d{2}):(\d{2})/);sleepTime=sm?(sm[1]+':'+sm[2]):time;}
        const who=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(who==='baby jah'||who==='baby_jah'){
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.shared.baby_jah.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.shared.baby_jah.sleep.push({date,slept:st,woke:wk,type:parseInt(sleepTime)>=18||parseInt(sleepTime)<6?'night':'nap',notes:r.notes||''});
          }
        }else{
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.ra.schedule.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.ra.schedule.sleep.push({date,slept:st,woke:wk,notes:r.notes||''});
          }
        }}break;
    }
  }
  // Sort arrays by date+time
  const sortDT=(a,b)=>(a.date+a.time).localeCompare(b.date+b.time);
  D.shared.baby_jah.diapers.sort(sortDT);
  D.shared.baby_jah.feeding.sort(sortDT);
  D.shared.baby_jah.activities.sort(sortDT);
  D.shared.baby_jah.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.schedule.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.transactions.sort(sortDT);
}

// === TIMEOUT FETCH ===
function fetchWithTimeout(url,opts={},ms=3000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(timer));
}

// === INIT ===
async function init(){
  try{
    // Load JSON first (critical path)
    const dataRes=await fetch('dashboard-data.json');
    D=await dataRes.json();

    // Fire all 3 API calls in parallel with timeouts
    const [,sheetRows,weather]=await Promise.all([
      fetchHolidays(),
      fetchWithTimeout(QUICKLOG_ENDPOINT,{},4000).then(r=>r.json()).catch(()=>null),
      fetchWeather(D.location.lat,D.location.lon)
    ]);
    if(sheetRows)mergeSheetData(D,sheetRows);
    W=weather;

    updateHeader();buildTabs();render();

    const updated=new Date(D.last_updated);
    document.getElementById('dash-label').textContent='Updated '+updated.toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('footer').textContent='RA Dashboard';

    if(isStale(D.last_updated,3)){
      document.getElementById('status-dot').style.background='#f59e0b';
      document.getElementById('status-dot').style.boxShadow='0 0 6px #f59e0b';
    }
    document.getElementById('loader').classList.add('hide');
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.remove()},500);
  }catch(e){
    document.getElementById('loader').classList.add('hide');
    document.getElementById('ov').innerHTML=`<div class="c"><div class="ct m">Error</div><p style="color:#ef4444;font-size:13px">Could not load: ${e.message}</p></div>`;
  }
}
init();
</script>
