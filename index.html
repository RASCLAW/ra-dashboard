<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Life OS</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1a2e;--surface:#232340;--card:#2a2a4a;--card-hover:#333358;--border:rgba(255,255,255,0.09);--text:#f0ede8;--text-secondary:#b0a9a0;--muted:#7a7470;--input-bg:#232340;
--green:#7dd8b0;--green-dim:rgba(125,216,176,0.12);--green-glow:rgba(125,216,176,0.18);
--blue:#6eaee0;--blue-dim:rgba(110,174,224,0.12);
--pink:#e896b8;--pink-dim:rgba(232,150,184,0.12);--pink-glow:rgba(232,150,184,0.14);
--orange:#e8b060;--orange-dim:rgba(232,176,96,0.12);
--red:#e87070;--red-dim:rgba(232,112,112,0.12);
--purple:#a89ed0;--purple-dim:rgba(168,158,208,0.12);
--btn-text:#1a1a2e;
--r-xl:24px;--r-md:14px;--r-sm:10px;--r-pill:50px;
--shadow-card:0 2px 12px rgba(0,0,0,0.15),0 1px 3px rgba(0,0,0,0.10);
--nav-bg:rgba(22,22,32,0.88);
--font-display:'Space Grotesk',sans-serif;--font-body:'DM Sans',sans-serif}
:root.light{--bg:#f5f3ef;--surface:#eae7e1;--card:#ffffff;--card-hover:#f0ede8;--border:rgba(0,0,0,0.08);--text:#1a1a2e;--text-secondary:#5a5550;--muted:#8a8580;--input-bg:#eae7e1;
--green:#2a9d6a;--green-dim:rgba(42,157,106,0.10);--green-glow:rgba(42,157,106,0.12);
--blue:#3a7fc0;--blue-dim:rgba(58,127,192,0.10);
--pink:#c05a88;--pink-dim:rgba(192,90,136,0.10);--pink-glow:rgba(192,90,136,0.08);
--orange:#c08030;--orange-dim:rgba(192,128,48,0.10);
--red:#c04040;--red-dim:rgba(192,64,64,0.10);
--purple:#7a6aaa;--purple-dim:rgba(122,106,170,0.10);
--btn-text:#ffffff;
--shadow-card:0 1px 4px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
--nav-bg:rgba(245,243,239,0.92);
--font-display:'Space Grotesk',sans-serif;--font-body:'DM Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.m{font-family:var(--font-display)}
.hero{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;max-width:420px;margin:0 auto 10px}
.hero-time{font-family:var(--font-display);font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1;color:var(--text)}
.hero-date{font-size:11px;color:var(--text-secondary);font-weight:500}
.hero-sub{font-size:10px;color:var(--green);font-weight:600}
.hero-right{text-align:right}
.page{max-width:420px;margin:0 auto;padding:0 16px 90px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border);display:flex;justify-content:center;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));z-index:100;backdrop-filter:blur(20px) saturate(150%);-webkit-backdrop-filter:blur(20px) saturate(150%)}
.bottom-nav-inner{display:flex;gap:0;max-width:420px;width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border:none;background:none;cursor:pointer;color:var(--muted);transition:color .15s ease;font-family:var(--font-body)}
.nav-btn:active{transform:scale(0.92)}
.nav-btn.active{color:var(--green)}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:9px;font-weight:600;letter-spacing:0.5px}
.tabs{display:none}
.s{display:none}.s.a{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.c{background:var(--card);border-radius:var(--r-xl);padding:20px;margin-bottom:12px;box-shadow:var(--shadow-card);border:1px solid var(--border)}
.ct{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);font-family:var(--font-display)}
.r{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.r:last-of-type{border-bottom:none}
.rl{display:flex;align-items:center;gap:10px}
.d{width:7px;height:7px;border-radius:50%}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:var(--font-display)}
.val{font-size:18px;font-weight:700}
.icon-box{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.alert-danger{background:var(--red-dim);color:var(--red)}
.alert-warning{background:var(--orange-dim);color:var(--orange)}
.alert-ok{background:var(--green-dim);color:var(--green)}
.alert-money{background:var(--orange-dim);color:var(--orange)}
.stale-warning{background:var(--red-dim);border:1px solid rgba(224,96,96,0.15);border-radius:var(--r-md);padding:10px;margin-top:10px;font-size:11px;color:var(--red);line-height:1.5}
.jah-accent{color:var(--pink)}
.jah-bg{background:linear-gradient(145deg,rgba(224,126,168,0.08) 0%,rgba(91,155,213,0.06) 100%)}
.jah-border{border:1px solid rgba(224,126,168,0.1);box-shadow:var(--shadow-card),0 0 40px var(--pink-glow)}
.log-entry{display:flex;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.log-entry:last-of-type{border-bottom:none}
.empty-state{text-align:center;padding:14px 0 2px;font-size:11px;color:var(--muted);font-style:italic}
.pills{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.pills::-webkit-scrollbar{display:none}
.pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--r-pill);font-size:11px;font-weight:600;white-space:nowrap;border:1px solid var(--border);background:var(--surface)}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pill-dot.live{animation:pulseDot 2s infinite}
@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:0.4}}
.family-bar{display:flex;gap:6px;margin-bottom:16px;padding:0}
.fam-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--r-pill);background:var(--surface);border:1.5px solid var(--border);cursor:pointer;transition:all .15s ease;flex:1;min-width:0}
.fam-chip:active{transform:scale(0.96)}
.fam-chip.home-chip{flex:0 0 auto;padding:6px 10px}
.fam-chip.active-home{border-color:var(--green);background:var(--green-dim)}
.fam-chip.active-ra{border-color:var(--green);background:var(--green-dim)}
.fam-chip.active-belle{border-color:var(--pink);background:var(--pink-dim)}
.fam-chip.jah-chip{border-color:rgba(224,126,168,0.15);background:rgba(224,126,168,0.05)}
.fam-chip.active-jah{border-color:var(--pink);background:var(--pink-dim)}
.fam-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.fam-text{min-width:0;overflow:hidden}
.fam-name{font-size:9px;font-weight:700;font-family:var(--font-display);letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fam-status{font-size:8px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fab{position:fixed;bottom:72px;right:20px;width:52px;height:52px;border-radius:50%;background:var(--green);color:var(--btn-text);border:none;font-size:26px;font-weight:700;cursor:pointer;z-index:100;box-shadow:0 4px 20px rgba(107,201,160,.35);transition:transform .2s;display:flex;align-items:center;justify-content:center}
.fab:active{transform:scale(.92)}
.ql-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1500;display:none;align-items:flex-end;justify-content:center}
.ql-overlay.open{display:flex}
.ql-sheet{width:100%;max-width:420px;max-height:85vh;background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px 32px;overflow-y:auto;animation:slideUp .25s ease;border:1px solid var(--border);border-bottom:none}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ql-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.ql-header h3{font-size:16px;font-weight:700;font-family:var(--font-display)}
.ql-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:4px 8px}
.ql-cats{display:flex;gap:6px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px}
.ql-cat{padding:8px 14px;border:1px solid var(--border);border-radius:var(--r-pill);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.ql-cat.a{background:var(--green);color:var(--btn-text);border-color:var(--green)}
.ql-form{display:none}.ql-form.a{display:block}
.ql-field{margin-bottom:14px}
.ql-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-family:var(--font-display)}
.ql-field input,.ql-field select{width:100%;padding:12px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color .2s}
.ql-field input:focus,.ql-field select:focus{border-color:var(--green)}
.ql-toggle{display:flex;gap:6px}
.ql-toggle button{flex:1;padding:12px;border:1px solid var(--border);border-radius:var(--r-sm);background:transparent;color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.ql-toggle button.a{background:var(--green);color:var(--btn-text);border-color:var(--green)}
.ql-submit{width:100%;padding:14px;background:var(--green);color:var(--btn-text);border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .2s}
.ql-submit:disabled{opacity:.4;cursor:not-allowed}
.ql-done{text-align:center;padding:32px 0}
.ql-done .check{font-size:48px;margin-bottom:8px}
.ql-done p{color:var(--muted);font-size:13px}
.weather-rec-moto{background:var(--green-dim);border:1px solid rgba(107,201,160,.2);color:var(--green);border-radius:var(--r-sm)}
.weather-rec-early{background:var(--orange-dim);border:1px solid rgba(224,160,80,.2);color:var(--orange);border-radius:var(--r-sm)}
.weather-rec-car{background:var(--red-dim);border:1px solid rgba(224,96,96,.2);color:var(--red);border-radius:var(--r-sm)}
.loader-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s}
.loader-screen.hide{opacity:0;pointer-events:none}
.loader-dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;margin:0 4px;animation:pulse 1.2s infinite}
.loader-dot:nth-child(2){animation-delay:.2s}
.loader-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.2)}}
.more-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1400;display:none;align-items:flex-end;justify-content:center}
.more-overlay.open{display:flex}
.more-sheet{width:100%;max-width:420px;background:var(--card);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:20px 16px 32px;animation:slideUp .2s ease;border:1px solid var(--border);border-bottom:none}
.more-btn{display:flex;align-items:center;gap:12px;width:100%;padding:16px;border:none;background:var(--surface);border-radius:var(--r-md);color:var(--text);font-family:var(--font-body);font-size:15px;font-weight:600;cursor:pointer;margin-bottom:8px;transition:background .15s}
.more-btn:active{background:var(--card-hover)}
.more-icon{font-size:20px;width:32px;text-align:center}
.card-edit{background:none;border:none;cursor:pointer;font-size:14px;color:var(--muted);padding:2px 4px;transition:color .15s}
.card-edit:active{color:var(--green)}
.card-edit.active{color:var(--green)}
.edit-row{display:flex;gap:6px;margin-bottom:8px;animation:fadeIn .15s ease}
.edit-row input{flex:1;padding:8px 10px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font-body);font-size:13px;outline:none}
.edit-row input:focus{border-color:var(--green)}
.edit-row button{padding:8px 12px;border:none;border-radius:var(--r-sm);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer}
.edit-add{background:var(--green);color:var(--btn-text)}
.edit-done{background:var(--surface);color:var(--green);border:1px solid var(--green) !important}
.edit-del{background:none;color:var(--red);font-size:14px;padding:0 6px;border:none;cursor:pointer}
.jah-quick{display:flex;gap:6px;margin-bottom:8px;animation:fadeIn .15s ease}
.jah-quick button{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--r-sm);background:var(--surface);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font-body)}
.jah-quick button:active{background:var(--pink-dim);border-color:var(--pink)}
</style>
</head>
<body>

<div class="loader-screen" id="loader">
  <div style="font-size:13px;color:var(--muted);margin-bottom:12px;font-family:var(--font-display);letter-spacing:1px">LIFE OS</div>
  <div><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span></div>
</div>

<!-- COMPACT HEADER -->
<div class="hero">
  <div>
    <div class="hero-time" id="live-clock"></div>
    <div class="hero-date" id="header-date"></div>
  </div>
  <div class="hero-right">
    <div style="font-size:11px;color:var(--text-secondary);text-align:right;font-weight:500" id="header-loc"></div>
    <div style="font-size:9px;color:var(--muted);text-align:right" id="header-updated"></div>
  </div>
  <div style="display:none"><span id="dash-label"></span><span id="status-dot"></span></div>
</div>

<div class="page">

<!-- FAMILY BAR (profile switcher + Jah status) -->
<div class="family-bar" id="family-bar"></div>

<div class="tabs" id="tab-bar"></div>

<div class="cnt" style="padding:0">
  <div class="s a" id="ov"></div>
  <div class="s" id="jh"></div>
  <div class="s" id="tr"></div>
  <div class="s" id="tl"></div>
  <div class="s" id="sm"></div>
  <div class="s" id="lg"></div>
  <div class="s" id="ex"></div>
</div>

<div style="text-align:center;padding:20px 0 16px">
  <span class="m" style="font-size:9px;color:var(--muted)" id="footer"></span>
</div>

</div><!-- /page -->

<!-- MORE MENU -->
<div class="more-overlay" id="more-overlay" onclick="if(event.target===this)closeMore()">
  <div class="more-sheet">
    <div style="width:40px;height:4px;border-radius:2px;background:var(--border);margin:0 auto 16px"></div>
    <button class="more-btn" onclick="navTo('tl');closeMore()"><span class="more-icon">&#128200;</span>Timeline</button>
    <button class="more-btn" onclick="navTo('sm');closeMore()"><span class="more-icon">&#128240;</span>News</button>
    <button class="more-btn" onclick="navTo('lg');closeMore()"><span class="more-icon">&#128221;</span>Log</button>
    <button class="more-btn" onclick="toggleTheme();closeMore()" id="theme-btn"><span class="more-icon" id="theme-icon">&#9788;</span><span id="theme-label">Light Mode</span></button>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="nav-btn active" id="nav-ov" onclick="goHome()"><span class="nav-icon">&#127968;</span><span class="nav-label">Home</span></button>
    <button class="nav-btn" id="nav-tr" onclick="navTo('tr')"><span class="nav-icon">&#9992;</span><span class="nav-label">Trip</span></button>
    <button class="nav-btn" id="nav-ex" onclick="navTo('ex')"><span class="nav-icon">&#128176;</span><span class="nav-label">Money</span></button>
    <button class="nav-btn" id="nav-more" onclick="openMore()"><span class="nav-icon">&#8943;</span><span class="nav-label">More</span></button>
  </div>
</nav>

<button class="fab" onclick="openQL()">+</button>

<div class="ql-overlay" id="ql-overlay" onclick="if(event.target===this)closeQL()">
  <div class="ql-sheet" id="ql-sheet">
    <div class="ql-header"><h3 id="ql-title">Quick Log</h3><button class="ql-close" onclick="closeQL()">&times;</button></div>
    <div class="ql-cats" id="ql-cats">
      <button class="ql-cat a" onclick="setQL('diaper')">Diaper</button>
      <button class="ql-cat" onclick="setQL('feeding')">Feeding</button>
      <button class="ql-cat" onclick="setQL('transaction')">Transaction</button>
      <button class="ql-cat" onclick="setQL('balance')">Balance</button>
      <button class="ql-cat" onclick="setQL('activity')">Activity</button>
      <button class="ql-cat" onclick="setQL('sleep')">Sleep</button>
    </div>
    <div id="ql-forms">
      <div class="ql-form a" id="ql-diaper">
        <div class="ql-field"><label>Type</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-diaper-type')">Wet</button><button onclick="qlToggle(this,'ql-diaper-type')">Poop</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-diaper-notes" placeholder="e.g. semi-hard, after lunch"></div>
        <input type="hidden" id="ql-diaper-type" value="wet">
      </div>
      <div class="ql-form" id="ql-feeding">
        <div class="ql-field"><label>Food</label><input type="text" id="ql-feeding-food" placeholder="e.g. Lugaw + Egg, Milk"></div>
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-feeding-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-feeding-who')">RA</button><button onclick="qlToggle(this,'ql-feeding-who')">Arabelle</button></div></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-feeding-notes" placeholder="e.g. ate well, only half"></div>
        <input type="hidden" id="ql-feeding-who" value="Baby Jah">
      </div>
      <div class="ql-form" id="ql-transaction">
        <div class="ql-field"><label>Amount (P)</label><input type="number" id="ql-tx-amount" placeholder="0"></div>
        <div class="ql-field"><label>Description</label><input type="text" id="ql-tx-desc" placeholder="e.g. Parking, Lugaw"></div>
        <div class="ql-field"><label>Category</label><select id="ql-tx-cat"><option value="food">Food</option><option value="transport">Transport</option><option value="shopping">Shopping</option><option value="load">Load</option><option value="transfer">Transfer</option></select></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-tx-notes" placeholder=""></div>
      </div>
      <div class="ql-form" id="ql-balance">
        <div class="ql-field"><label>Account</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-bal-acct')">Payroll</button><button onclick="qlToggle(this,'ql-bal-acct')">Savings</button><button onclick="qlToggle(this,'ql-bal-acct')">Pocket Cash</button></div></div>
        <div class="ql-field"><label>New Balance (P)</label><input type="number" id="ql-bal-amount" placeholder="0"></div>
        <input type="hidden" id="ql-bal-acct" value="payroll">
      </div>
      <div class="ql-form" id="ql-activity">
        <div class="ql-field"><label>Activity</label><input type="text" id="ql-act-desc" placeholder="e.g. Morning walk, Watching Miss Rachel"></div>
      </div>
      <div class="ql-form" id="ql-sleep">
        <div class="ql-field"><label>Who</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-who')">Baby Jah</button><button onclick="qlToggle(this,'ql-sleep-who')">RA</button></div></div>
        <div class="ql-field"><label>Action</label><div class="ql-toggle"><button class="a" onclick="qlToggle(this,'ql-sleep-action')">Slept</button><button onclick="qlToggle(this,'ql-sleep-action')">Woke</button></div></div>
        <div class="ql-field"><label>Time</label><input type="time" id="ql-sleep-time"></div>
        <div class="ql-field"><label>Notes (optional)</label><input type="text" id="ql-sleep-notes" placeholder="e.g. Post-shift nap"></div>
        <input type="hidden" id="ql-sleep-who" value="Baby Jah">
        <input type="hidden" id="ql-sleep-action" value="slept">
      </div>
    </div>
    <button class="ql-submit" id="ql-submit" onclick="submitQL()">Log It</button>
    <div class="ql-done" id="ql-done" style="display:none"><div class="check">&#10003;</div><p>Logged!</p></div>
  </div>
</div>

<script>
// === NAV ===
function navTo(id){
  document.querySelectorAll('.s').forEach(s=>s.classList.remove('a'));
  document.getElementById(id).classList.add('a');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const navBtn=document.getElementById('nav-'+id);

// Use Date.now() for all calculations (UTC-based, no timezone bugs)
// Use Intl for display only
function manilaHour(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',hour:'numeric',hour12:false}))}
function manilaMinute(){return parseInt(new Date().toLocaleString('en-US',{timeZone:'Asia/Manila',minute:'numeric'}))}
function manilaDayNum(){return new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'narrow'})==='S'?((new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'})==='Sunday')?0:6):['Monday','Tuesday','Wednesday','Thursday','Friday'].indexOf(new Date().toLocaleDateString('en-US',{timeZone:'Asia/Manila',weekday:'long'}))+1}
function manilaDateStr(){return new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'})}
function fmt(n){return n==null?'--':'P'+n.toLocaleString()}
function fmt12(t){if(!t)return'';let s=typeof t==='string'?t:String(t);s=s.replace(/[^\d:]/g,'');const parts=s.match(/^(\d{1,2}):(\d{2})/);if(!parts)return'';const h=parseInt(parts[1]),m=parseInt(parts[2]);const ampm=h>=12?'PM':'AM';const h12=h%12||12;return h12+':'+String(m).padStart(2,'0')+' '+ampm}
function fmtDate(d){const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const parts=d.split('-');return m[parseInt(parts[1])-1]+' '+parseInt(parts[2])}
function isStale(d,days){if(!d)return true;return(Date.now()-new Date(d+'T00:00:00+08:00').getTime())>days*86400000}
function billDaysLeft(b){if(!b.due_date)return null;const todayMs=new Date(manilaDateStr()+'T00:00:00+08:00').getTime();const dueMs=new Date(b.due_date+'T00:00:00+08:00').getTime();return Math.round((dueMs-todayMs)/86400000)}
// Pay schedule: reads from D.shared.pay_schedule
function nextPaydays(){
  if(!D||!D.shared.pay_schedule)return[];
  const today=new Date(manilaDateStr()+'T00:00:00+08:00');const todayMs=today.getTime();const oneDay=86400000;
  const ps=D.shared.pay_schedule;
  const results=[];

  // RA: semi-monthly on specific days. Weekend -> Friday before
  if(ps.ra&&ps.ra.type==='semi-monthly'){
    const days=ps.ra.days||[15,31];
    const y=today.getFullYear(),m=today.getMonth();
    const candidates=[];
    for(let mo=m;mo<=m+1;mo++){
      const yr=mo>11?y+1:y;const mn=mo%12;
      for(const day of days){
        // day 31 = last day of month
        const lastDay=new Date(yr,mn+1,0).getDate();
        const d=new Date(yr,mn,Math.min(day,lastDay));
        candidates.push(d);
      }
    }
    for(const c of candidates){
      let d=new Date(c);
      if(d.getDay()===0)d=new Date(d.getTime()-2*oneDay);
      if(d.getDay()===6)d=new Date(d.getTime()-oneDay);
      if(d.getTime()>=todayMs){results.push({date:d,label:'RA payday',daysUntil:Math.round((d.getTime()-todayMs)/oneDay)});break}
    }
  }

  // Arabelle: bi-weekly from anchor date
  if(ps.arabelle&&ps.arabelle.type==='bi-weekly'&&ps.arabelle.anchor){
    const anchor=new Date(ps.arabelle.anchor+'T00:00:00+08:00').getTime();
    const interval=(ps.arabelle.interval_days||14)*oneDay;
    let next=anchor;
    while(next<todayMs)next+=interval;
    const d=new Date(next);
    results.push({date:d,label:'Arabelle payday',daysUntil:Math.round((d.getTime()-todayMs)/oneDay)});
  }

  results.sort((a,b)=>a.daysUntil-b.daysUntil);
  return results;
}
function timeAgo(d,t){if(!d)return null;let tStr=t||'12:00';if(typeof tStr!=='string')tStr=String(tStr);tStr=tStr.replace(/[^\d:]/g,'');if(tStr.length===1||tStr.length===2)tStr=tStr+':00';if(!tStr.match(/^\d{1,2}:\d{2}/))tStr='12:00';const parts=tStr.match(/^(\d{1,2}):(\d{2})/);if(!parts)return null;const clean=parts[1].padStart(2,'0')+':'+parts[2];const then=new Date(d+'T'+clean+':00+08:00');if(isNaN(then.getTime()))return null;const diff=Date.now()-then.getTime();if(diff<0)return 'just now';const mins=Math.floor(diff/60000);if(mins<60)return mins+'m ago';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'h ago';const days=Math.floor(hrs/24);return days+'d ago'}
function daysUntil(d){const today=manilaDateStr();const todayMs=new Date(today+'T00:00:00+08:00').getTime();const thenMs=new Date(d+'T00:00:00+08:00').getTime();const diff=Math.round((thenMs-todayMs)/86400000);if(diff===0)return 'Today';if(diff===1)return 'Tomorrow';if(diff<0)return Math.abs(diff)+'d ago';return 'in '+diff+' days'}

let HOLIDAYS=[];
async function fetchHolidays(){
  try{
    const year=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).split('-')[0];
    const cacheKey='holidays_'+year;
    const cached=localStorage.getItem(cacheKey);
    if(cached){const c=JSON.parse(cached);if(c.ts&&Date.now()-c.ts<86400000){HOLIDAYS=c.data;return}}
    const res=await fetchWithTimeout(`https://date.nager.at/api/v3/PublicHolidays/${year}/PH`,{},3000);
    HOLIDAYS=await res.json();
    localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),data:HOLIDAYS}));
  }catch(e){
    const year=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}).split('-')[0];
    const cached=localStorage.getItem('holidays_'+year);
    if(cached){try{HOLIDAYS=JSON.parse(cached).data||[]}catch(_){HOLIDAYS=[]}}else{HOLIDAYS=[]}
  }
}
function getTodayHoliday(){
  const today=manilaDateStr();
  const h=HOLIDAYS.find(h=>h.date===today);
  return h?h.name:null;
}
function isHoliday(dateStr){
  return HOLIDAYS.some(h=>h.date===dateStr);
}
function getUpcomingHoliday(){
  const today=manilaDateStr();
  return HOLIDAYS.find(h=>h.date>=today)||null;
}

async function fetchWeather(lat,lon){
  try{
    const cacheKey='weather_'+lat+'_'+lon;
    const cached=localStorage.getItem(cacheKey);
    if(cached){const c=JSON.parse(cached);if(c.ts&&Date.now()-c.ts<1800000){return c.data}}
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability,weathercode&timezone=Asia%2FManila&forecast_days=2`;
    const res=await fetchWithTimeout(url,{},3000);
    const data=await res.json();
    localStorage.setItem(cacheKey,JSON.stringify({ts:Date.now(),data}));
    return data;
  }catch(e){
    const cacheKey='weather_'+lat+'_'+lon;
    const cached=localStorage.getItem(cacheKey);
    if(cached){try{return JSON.parse(cached).data}catch(_){}}
    return null;
  }
}

  h+=`<div class="c">

    <div style="display:flex;gap:6px;margin-bottom:8px">

      ${(S.accounts.savings.balance||0)>100?`<div style="flex:1;background:var(--surface);border-radius:${CSS_R_SM};padding:8px"><div class="m" style="font-size:8px;color:var(--muted);letter-spacing:0.5px">SAVINGS</div><div class="m" style="font-size:14px;font-weight:700;color:var(--green);margin-top:2px">${hid?'****':fmt(S.accounts.savings.balance)}</div></div>`:''}
      ${(S.accounts.pocket_cash.balance||0)>100?`<div style="flex:1;background:var(--surface);border-radius:${CSS_R_SM};padding:8px"><div class="m" style="font-size:8px;color:var(--muted);letter-spacing:0.5px">POCKET</div><div class="m" style="font-size:14px;font-weight:700;color:var(--orange);margin-top:2px">${fmt(S.accounts.pocket_cash.balance)}</div></div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
      <div style="background:var(--surface);border-radius:${CSS_R_SM};padding:8px"><div class="m" style="font-size:8px;color:var(--muted);letter-spacing:0.5px">TOTAL</div><div class="m" style="font-size:15px;font-weight:700;color:var(--green);margin-top:2px">${hid?'****':fmt(total)}</div></div>
      <div style="background:var(--surface);border-radius:${CSS_R_SM};padding:8px"><div class="m" style="font-size:8px;color:var(--muted);letter-spacing:0.5px">BILLS DUE</div><div class="m" style="font-size:15px;font-weight:700;color:var(--orange);margin-top:2px">${hid?'****':fmt(pendingTotal)}</div></div>

  // 3. UPCOMING BILLS
  const localPaid=JSON.parse(localStorage.getItem('paid_bills')||'[]');
  const visibleBills=pendingBills.filter(b=>!localPaid.includes(b.name));
  if(visibleBills.length){
    h+='<div class="c"><div class="ct m">Bills Due</div>';
    visibleBills.forEach(b=>{
      const dl=billDaysLeft(b);
      const dueStr=b.due_date?(dl<0?Math.abs(dl)+'d overdue':daysUntil(b.due_date)):'pending';
      h+=`<div class="r"><div class="rl"><div class="d" style="background:${dl!==null&&dl<0?'var(--red)':'var(--orange)'}"></div><div><span style="font-size:13px">${b.name}</span><div class="m" style="font-size:9px;color:${dl!==null&&dl<0?'var(--red)':'var(--muted)'}">${dueStr}</div></div></div>
        <div style="display:flex;align-items:center;gap:8px"><span class="m" style="font-weight:600;font-size:13px">${fmt(b.amount)}</span><button onclick="markBillPaid('${b.name.replace(/'/g,"\\'")}')" style="background:none;border:1px solid var(--border);border-radius:4px;padding:2px 8px;color:var(--green);font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font-body)">Paid</button></div></div>`;
    });
    h+='</div>';
  }

  // 4. SCHEDULE
  const todayStr=manilaDateStr();
  const nextEvents=S.calendar.filter(e=>new Date(e.date+'T23:59:59+08:00')>=new Date()).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'')).slice(0,6);
  const todayEvents=nextEvents.filter(e=>e.date===todayStr);
  const upcomingEvents=nextEvents.filter(e=>e.date!==todayStr).slice(0,3);
  if(todayEvents.length||upcomingEvents.length){
    h+='<div class="c"><div class="ct m">Schedule</div>';
    if(todayEvents.length){
      todayEvents.forEach(e=>{
        h+=`<div style="display:flex;gap:10px;align-items:center;padding:6px 0">
          <div class="icon-box" style="background:${catDims[e.category]||'var(--surface)'};font-size:12px">${catEmoji[e.category]||'📌'}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${e.title}</div><div class="m" style="font-size:10px;color:var(--muted)">${e.time?fmt12(e.time):'All day'}${e.notes?' -- '+e.notes:''}</div></div></div>`;
      });
    }else{
      h+='<div style="font-size:12px;color:var(--muted);padding:4px 0">Nothing scheduled today</div>';
    }
    if(upcomingEvents.length){
      h+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
      upcomingEvents.forEach(e=>{
        h+=`<div style="display:flex;gap:10px;align-items:center;padding:4px 0">
          <div class="icon-box" style="background:${catDims[e.category]||'var(--surface)'};font-size:11px">${catEmoji[e.category]||'📌'}</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:500">${e.title}</div><div class="m" style="font-size:9px;color:var(--muted)">${fmtDate(e.date)} ${daysUntil(e.date)}</div></div></div>`;
      });
      h+='</div>';
    }
    h+='</div>';
  }

  // 5. ACTIVE TRIP MINI CARD
  if(isOnTrip()){
    const trip=getActiveTrip();
    if(trip){
      const a=trip.actual_spending||{};const b=trip.budget||{};
      const totalSpent=(a.food||0)+(a.medicine||0)+(a.tolls||0)+(a.gas_actual||0)+(a.misc||0);
      const pct=b.total?Math.round(totalSpent/b.total*100):0;
      h+=`<div class="c" onclick="navTo('tr')" style="cursor:pointer">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="ct m" style="margin:0;padding:0;border:none">Active Trip</div>
          <span class="m" style="font-size:10px;color:var(--muted)">Tap for details</span>
        </div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">${trip.destination}</div>
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:6px">
          <span>Spent: ${fmt(totalSpent)}</span><span>Budget: ${fmt(b.total)}</span>
        </div>
        <div style="background:var(--surface);border-radius:4px;height:6px;overflow:hidden"><div style="background:${pct>100?'var(--red)':'var(--green)'};height:100%;width:${Math.min(pct,100)}%;border-radius:4px"></div></div>
        <div class="m" style="font-size:9px;color:var(--muted);margin-top:4px">${pct}% of budget</div>
      </div>`;
    }
  }

  // 6. COMBINED ALERTS + TODOS
  const alerts=[];
  if((S.accounts.pocket_cash.balance||0)<500)alerts.push({icon:'💵',text:'Pocket cash low: '+fmt(S.accounts.pocket_cash.balance),sub:'Withdraw soon',color:'var(--red)'});
  if(isStale(S.accounts.payroll.updated,7))alerts.push({icon:'🏦',text:'Account balances stale',sub:'Send a bank screenshot',color:'var(--orange)'});

  const removedTodos=JSON.parse(localStorage.getItem('removed_todos')||'[]');
  const raTodos=(D.ra.todos||[]).filter(t=>!t.done&&!removedTodos.includes(t.text)).slice(0,3);
  const araTodos=(D.arabelle.todos||[]).filter(t=>!t.done&&!removedTodos.includes(t.text)).slice(0,3);
  const addedRA=JSON.parse(localStorage.getItem('added_todos_ra')||'[]');
  const addedAra=JSON.parse(localStorage.getItem('added_todos_arabelle')||'[]');
  const allTodos=[...raTodos.map(t=>({...t,who:'RA'})),...araTodos.map(t=>({...t,who:'Arabelle'})),...addedRA.map(t=>({...t,who:'RA'})),...addedAra.map(t=>({...t,who:'Arabelle'}))].sort((a,b)=>{if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due)}).slice(0,6);

  h+=`<div class="c"><div style="display:flex;justify-content:space-between;align-items:center"><div class="ct m" style="margin-bottom:0;border:none;padding:0">Alerts & To Do</div>${pencilBtn('todos-home')}</div>
    <div id="edit-todos-home" style="display:none;margin:8px 0">
      <div class="edit-row"><input type="text" id="todo-input-ra" placeholder="Add todo for RA" onkeydown="if(event.key==='Enter')addTodo('ra')"><button class="edit-add" onclick="addTodo('ra')">+</button></div>
      <div class="edit-row"><input type="text" id="todo-input-arabelle" placeholder="Add todo for Arabelle" onkeydown="if(event.key==='Enter')addTodo('arabelle')"><button class="edit-add" onclick="addTodo('arabelle')">+</button></div>
    </div>`;
  alerts.forEach(a=>{
    h+=`<div style="display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:14px">${a.icon}</span>
      <div style="flex:1"><div style="font-size:12px;font-weight:600;color:${a.color}">${a.text}</div><div class="m" style="font-size:9px;color:var(--muted)">${a.sub}</div></div></div>`;
  });
  allTodos.forEach((t,i)=>{
    h+=`<div style="display:flex;gap:10px;align-items:center;padding:6px 0;${i<allTodos.length-1?'border-bottom:1px solid var(--border)':''}">
      <span class="m" style="font-size:9px;color:${t.who==='RA'?'var(--blue)':'var(--pink)'};font-weight:700;min-width:20px">${t.who}</span>
      <div style="flex:1;font-size:12px">${t.text}${t.due?'<span class="m" style="font-size:9px;color:var(--muted);margin-left:6px">'+daysUntil(t.due)+'</span>':''}</div>
      <button onclick="removeTodo('${t.text.replace(/'/g,"\\'")}','${t.who.toLowerCase()}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0 2px">&times;</button></div>`;
  });
  if(!alerts.length&&!allTodos.length)h+='<div class="empty-state">All clear</div>';
  h+='</div>';

  el.innerHTML=h;
}

          <div style="flex:1">${sec.render(item)}</div>
          <div style="text-align:right"><div class="m" style="font-size:10px;color:var(--muted)">${fmtDate(item.date)}</div>${sec.time(item)?`<div class="m" style="font-size:10px;color:var(--muted)">${sec.time(item)}</div>`:''}${sec.extra?sec.extra(item):''}</div></div>`;
      });

  if(jah.growth&&jah.growth.length){
    jah.growth.slice().reverse().forEach(g=>{
      h+=`<div class="log-entry"><div class="icon-box" style="background:var(--green-dim);font-size:13px">📏</div>

        <div class="m" style="font-size:10px;color:var(--muted)">${fmtDate(g.date)}</div></div>`;

function renderTrip(){
  const el=document.getElementById('tr');const trip=D.shared.trips.find(t=>t.status==='upcoming'||t.status==='active');
  if(!trip){el.innerHTML='<div class="c"><div class="ct m">No Active Trip</div><p style="color:var(--muted);font-size:13px">No trips planned right now.</p></div>';return}
  let h='';
  h+=`<div class="c"><div class="ct m">Destination</div><div style="font-size:22px;font-weight:700;margin-bottom:6px">${trip.destination}</div><div style="color:var(--muted);font-size:13px;line-height:1.7">${trip.name}<br>${trip.dates}<br>~${trip.distance_km} km // ${trip.route}<br>Drive time: ${trip.drive_hours} hours</div></div>`;
  // Today's Schedule
  if(trip.schedule&&trip.schedule.length){
    const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    const todaySched=trip.schedule.find(s=>s.date===today);
    if(todaySched&&todaySched.items.length){
      const icons={beach:'&#127754;',food:'&#127860;',event:'&#127891;',default:'&#128205;'};
      h+='<div class="c"><div class="ct m">Today -- '+todaySched.label+'</div>';
      todaySched.items.forEach(item=>{
        const ic=icons[item.icon]||icons.default;
        const t12=fmt12(item.time);
        h+=`<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border)">`;
        h+=`<div style="min-width:40px;text-align:center"><span style="font-size:20px">${ic}</span><div class="m" style="font-size:10px;color:var(--green);font-weight:600;margin-top:2px">${t12}</div></div>`;
        h+=`<div><div style="font-size:14px;font-weight:600">${item.event}</div>`;
        if(item.notes)h+=`<div style="font-size:12px;color:var(--text-secondary);margin-top:3px;line-height:1.4">${item.notes}</div>`;
        h+=`</div></div>`;
      });
      h+='</div>';
    }
  }
  // Tide Schedule
  if(trip.tide){
    const today=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Manila'});
    if(trip.tide.date===today){
      h+='<div class="c"><div class="ct m">Tide -- '+trip.tide.location+'</div>';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
      trip.tide.schedule.forEach(t=>{
        const isLow=t.type==='Low Tide';
        const col=isLow?'var(--blue)':'var(--orange)';
        const bg=isLow?'var(--blue-dim)':'var(--orange-dim)';
        h+=`<div style="background:${bg};border-radius:var(--r-md);padding:10px;text-align:center">`;
        h+=`<div class="m" style="font-size:10px;color:${col};font-weight:600">${t.type.toUpperCase()}</div>`;
        h+=`<div class="m" style="font-size:18px;font-weight:700;margin-top:4px">${fmt12(t.time)}</div>`;
        h+=`<div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${t.height}</div>`;
        h+=`</div>`;
      });
      h+='</div></div>';
    }
  }
  // Actual Spending vs Budget
  if(trip.actual_spending){
    const a=trip.actual_spending;const b=trip.budget;
    const foodSpent=a.food||0;const foodBudget=b.food||0;
    const totalSpent=(a.food||0)+(a.medicine||0)+(a.tolls||0)+(a.gas_actual||0)+(a.misc||0);
    const pct=b.total?Math.round(totalSpent/b.total*100):0;
    const overFood=foodSpent>foodBudget;
    h+='<div class="c"><div class="ct m">Spending vs Budget</div>';
    h+=`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:12px;color:var(--text-secondary)">Tracked spending</span><span class="m" style="font-weight:600;font-size:14px">${fmt(totalSpent)}</span></div>`;
    h+=`<div style="background:var(--surface);border-radius:6px;height:8px;overflow:hidden"><div style="background:${pct>100?'var(--red)':'var(--green)'};height:100%;width:${Math.min(pct,100)}%;border-radius:6px;transition:width .3s"></div></div>`;
    h+=`<div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:10px;color:var(--muted)">${pct}% of ${fmt(b.total)}</span><span style="font-size:10px;color:var(--muted)">Cash out: ${fmt(a.cash_withdrawn||0)}</span></div></div>`;
    h+=`<div class="r"><span style="font-size:13px">Food</span><span class="m" style="font-weight:600;color:${overFood?'var(--red)':'var(--text)'}">${fmt(foodSpent)} / ${fmt(foodBudget)}</span></div>`;
    if(a.medicine)h+=`<div class="r"><span style="font-size:13px">Medicine</span><span class="m" style="font-weight:600">${fmt(a.medicine)}</span></div>`;
    if(a.notes)h+=`<div style="font-size:11px;color:var(--text-secondary);margin-top:10px;line-height:1.5;padding:8px;background:var(--surface);border-radius:var(--r-sm)">${a.notes}</div>`;
    h+='</div>';
  }
  // Milestones / Journey Log
  if(trip.milestones&&trip.milestones.length){
    h+='<div class="c"><div class="ct m">Journey Log</div>';
    trip.milestones.forEach((m,i)=>{
      const isLast=i===trip.milestones.length-1;
      const dt=new Date(m.time.replace(' ','T')+'+08:00');
      const timeStr=dt.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'Asia/Manila'});
      const dateStr=dt.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'Asia/Manila'});
      h+=`<div style="display:flex;gap:12px;padding:8px 0">`;
      h+=`<div style="display:flex;flex-direction:column;align-items:center;min-width:12px">`;
      h+=`<div style="width:8px;height:8px;border-radius:50%;background:${isLast?'var(--green)':'var(--muted)'};flex-shrink:0;margin-top:4px"></div>`;
      if(!isLast)h+=`<div style="width:1px;flex:1;background:var(--border);margin-top:4px"></div>`;
      h+=`</div>`;
      h+=`<div style="padding-bottom:${isLast?'0':'10px'}"><div style="font-size:13px;font-weight:500">${m.event}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${dateStr}, ${timeStr}</div></div>`;
      h+=`</div>`;
    });
    h+='</div>';
  }
  // Trip Budget breakdown
  const b=trip.budget;
  h+=`<div class="c"><div class="ct m">Trip Budget</div>`;
  if(b.tolls)h+=`<div class="r"><span style="font-size:14px">Tolls (round trip)</span><span class="m" style="font-weight:600">${fmt(b.tolls)}</span></div>`;
  if(b.gas)h+=`<div class="r"><span style="font-size:14px">Gas (round trip)</span><span class="m" style="font-weight:600">${fmt(b.gas)}</span></div>`;
  if(b.food)h+=`<div class="r"><span style="font-size:14px">Food</span><span class="m" style="font-weight:600">${fmt(b.food)}</span></div>`;
  if(b.misc)h+=`<div class="r"><span style="font-size:14px">Misc / Pasalubong</span><span class="m" style="font-weight:600">${fmt(b.misc)}</span></div>`;
  h+=`<div style="display:flex;justify-content:space-between;padding-top:10px;margin-top:6px;border-top:2px solid var(--blue)"><span class="m" style="color:var(--muted);font-size:11px">Estimated Total</span><span class="m" style="color:var(--blue);font-weight:700;font-size:22px">${fmt(b.total)}</span></div></div>`;
  if(trip.alerts&&trip.alerts.length){h+='<div class="c"><div class="ct m">Road Alerts</div>';trip.alerts.forEach(a=>{h+=`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:10px"><div class="m alert-${a.type}" style="min-width:28px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700">${alertLabels[a.type]||'!'}</div><span style="font-size:13px;line-height:1.4">${a.text}</span></div>`});h+='</div>'}
  if(trip.highlights&&trip.highlights.length){h+='<div class="c"><div class="ct m">Things to Do</div>';trip.highlights.forEach(hl=>{h+=`<div style="display:flex;gap:10px;align-items:center;padding:6px 0"><span style="color:var(--blue)">&#x2022;</span><span style="font-size:13px">${hl}</span></div>`});h+='</div>'}
  if(trip.food_spots&&trip.food_spots.length){h+='<div class="c"><div class="ct m">Food Spots</div>';trip.food_spots.forEach(f=>{h+=`<div style="display:flex;gap:10px;align-items:center;padding:6px 0"><span style="color:var(--orange)">&#x2022;</span><span style="font-size:13px">${f}</span></div>`});h+='</div>'}
  el.innerHTML=h;
}

function jahStatus(){
  const jah=D.shared.baby_jah;if(!jah)return{icon:'👶',text:'No data',sub:''};
  const toMin=(d,t)=>{if(!d||!t)return-Infinity;const[h,m]=(t||'0:0').split(':').map(Number);return(new Date(d+'T00:00:00+08:00').getTime()/60000)+h*60+m};
  const nowMin=Date.now()/60000;
  const ago=m=>{const d=nowMin-m;if(d<1)return'just now';if(d<60)return Math.round(d)+'m ago';if(d<1440)return Math.round(d/60)+'h ago';return Math.round(d/1440)+'d ago'};
  // Find most recent event across all categories
  const events=[];
  (jah.feeding||[]).forEach(f=>events.push({type:'fed',min:toMin(f.date,f.time),label:f.food,time:f.time}));
  (jah.sleep||[]).forEach(s=>{
    if(s.slept)events.push({type:'slept',min:toMin(s.date,s.slept),label:s.type,time:s.slept});
    if(s.woke)events.push({type:'woke',min:toMin(s.date,s.woke),label:s.type,time:s.woke});
  });
  (jah.diapers||[]).forEach(d=>events.push({type:'diaper',min:toMin(d.date,d.time),label:d.type,time:d.time}));
  (jah.activities||[]).forEach(a=>events.push({type:'activity',min:toMin(a.date,a.time),label:a.activity,time:a.time}));
  events.sort((a,b)=>b.min-a.min);
  if(!events.length)return{icon:'👶',text:'No data yet',sub:''};
  const latest=events[0];const sinceMin=nowMin-latest.min;
  const lastFed=events.find(e=>e.type==='fed');const sinceFed=lastFed?(nowMin-lastFed.min):Infinity;
  const lastSlept=events.find(e=>e.type==='slept');
  const lastWoke=events.find(e=>e.type==='woke');
  // PRIORITY CHECK: if there's an active sleep (slept with no woke), baby is sleeping -- period
  const activeSleep=(jah.sleep||[]).findLast(s=>s.slept&&!s.woke);
  if(activeSleep){const sm=toMin(activeSleep.date,activeSleep.slept);return{icon:'😴',text:activeSleep.type==='nap'?'Napping':'Sleeping',sub:ago(sm)+' ('+fmt12(activeSleep.slept)+')'};}
  // Determine status
  if(latest.type==='slept'){return{icon:'😴',text:'Sleeping',sub:ago(latest.min)+' ('+fmt12(latest.time)+')'};}
  if(latest.type==='woke'){
    if(sinceFed>120)return{icon:'🥱',text:'Just woke up -- probably hungry',sub:ago(latest.min)};
    if(sinceMin<30)return{icon:'🥱',text:'Just woke up',sub:ago(latest.min)};
  }
  if(latest.type==='fed'){
    const isMilk=latest.label&&latest.label.toLowerCase().includes('milk');
    if(sinceMin<30)return{icon:'🍼',text:isMilk?'Just had milk':'Just ate '+latest.label,sub:fmt12(latest.time)};
    if(sinceMin<90)return{icon:'😊',text:isMilk?'Had milk':'Fed -- '+latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='activity'){
    if(latest.label.toLowerCase().includes('bath'))return{icon:'🛁',text:'Fresh from bath',sub:fmt12(latest.time)};
    if(sinceMin<60)return{icon:'🏃',text:latest.label,sub:ago(latest.min)};
  }
  if(latest.type==='diaper'){
    if(sinceMin<15)return{icon:'🧷',text:'Just had a diaper change',sub:fmt12(latest.time)};
  }
  // Fallback: check hunger
  if(sinceFed>180)return{icon:'😐',text:'Might be hungry soon',sub:'Last fed '+ago(lastFed.min)};
  if(sinceFed>90)return{icon:'😊',text:'Playing/awake',sub:'Last fed '+ago(lastFed.min)};
  return{icon:'😊',text:'Doing good',sub:ago(latest.min)};
}

      ${tripTotal?`<div style="background:var(--bg);border-radius:8px;padding:12px"><div class="m" style="font-size:9px;color:var(--muted);letter-spacing:0.5px">TRIP EST</div><div class="m" style="font-size:18px;font-weight:700;color:var(--purple);margin-top:2px">~${fmt(tripTotal)}</div></div>`:''}
    </div>`;
  if(remaining<5000)h+=`<div class="stale-warning">After bills + trip: <span class="m" style="font-weight:700">${fmt(remaining)}</span> remaining.</div>`;
  h+='</div>';

  if(D.shared.patterns&&D.shared.patterns.length){
    h+='<div class="c"><div class="ct m">Spending Patterns</div>';
    D.shared.patterns.forEach(p=>{h+=`<div class="r"><div class="rl"><div class="d" style="background:var(--orange)"></div><span style="font-size:13px">${p.category}</span></div><div class="rl" style="gap:12px"><span class="m" style="color:var(--muted);font-size:10px">${p.frequency}</span><span class="m" style="font-weight:600;font-size:13px">${p.amount?'~'+fmt(p.amount):'--'}</span></div></div>`});
    h+=`<div class="empty-state">More patterns as data builds up</div></div>`;
  }
  el.innerHTML=h;
}

function tickTodo(i){
  const check=document.getElementById('todo-check-'+i);
  const text=document.getElementById('todo-text-'+i);
  const row=check.parentElement;
  const todoItem=(D[PROFILE]||D['ra']).todos.filter(t=>!t.done).sort((a,b)=>{if(!a.due)return 1;if(!b.due)return-1;return a.due.localeCompare(b.due)})[i];

    row.style.transition='';row.style.maxHeight='';row.style.overflow='';

}

const editState={};

function postToSheet(payload){
  const fd=new FormData();fd.append('payload',JSON.stringify(payload));
  fetch(QUICKLOG_ENDPOINT,{method:'POST',body:fd,mode:'no-cors'}).catch(()=>{});
}

// Remove todo
function removeTodo(text,who){
  // Add to removed list in localStorage
  const key='removed_todos';
  const removed=JSON.parse(localStorage.getItem(key)||'[]');
  if(!removed.includes(text))removed.push(text);
  localStorage.setItem(key,JSON.stringify(removed));
  // Also remove from added_todos if it was locally added
  const addedKey='added_todos_'+who;
  const added=JSON.parse(localStorage.getItem(addedKey)||'[]');
  const filtered=added.filter(t=>t.text!==text);
  localStorage.setItem(addedKey,JSON.stringify(filtered));
  postToSheet({category:'todo',logged_by:who==='ra'?'RA':'Arabelle',detail_1:text,detail_2:'done'});
  renderedTabs['ov']=false;render();renderedTabs['ov']=true;
}

// Baby Jah quick entry -- tap button, fill mini form, submit
let jahQuickType=null;
function jahQuickSelect(type,editId){
  jahQuickType=type;
  const panel=document.getElementById('jah-form-'+editId);
  if(!panel)return;
  if(type==='sleep'||type==='woke'){
    // One-tap: log immediately + update in-memory data
    const now=new Date().toLocaleString('en-CA',{timeZone:'Asia/Manila',hour:'2-digit',minute:'2-digit',hour12:false}).slice(-5);
    const today=manilaDateStr();
    const payload={logged_by:PROFILE==='arabelle'?'Arabelle':'RA',who:'Baby Jah',category:'sleep',detail_1:type==='sleep'?'slept':'woke',detail_2:now,notes:''};
    postToSheet(payload);
    // Update local data immediately
    if(type==='sleep'){
      D.shared.baby_jah.sleep.push({date:today,slept:now,woke:null,type:parseInt(now)<6||parseInt(now)>=18?'night':'nap',notes:''});
    }else{
      // Close the active sleep entry
      const active=D.shared.baby_jah.sleep.findLast(s=>s.slept&&!s.woke);
      if(active)active.woke=now;
      else D.shared.baby_jah.sleep.push({date:today,slept:null,woke:now,type:'nap',notes:''});
    }
    panel.innerHTML='<div style="text-align:center;padding:8px;font-size:12px;color:var(--green);font-weight:600">'+(type==='sleep'?'Logged: sleeping now':'Logged: woke up')+'</div>';

    return;
  }
  const labels={fed:'What did Jah eat?',diaper:'',activity:'What is Jah doing?'};
  if(type==='diaper'){
    panel.innerHTML='<div class="edit-row" style="margin-top:6px"><button class="edit-add" style="flex:1" onclick="jahQuickSubmit(\'wet\',\''+editId+'\')">Wet</button><button class="edit-add" style="flex:1;background:var(--orange)" onclick="jahQuickSubmit(\'poop\',\''+editId+'\')">Poop</button></div>';

  }
}

// === MERGE SHEET DATA ===
function mergeSheetData(D,rows){
  if(!rows||!rows.length)return;
  const today=manilaDateStr();
  for(const r of rows){
    // Normalize date/time -- Google Sheets returns ISO Date objects
    let date=r.date||today;
    let time=r.time||'00:00';
    // Date: "2026-03-24T00:00:00.000Z" -> "2026-03-24"
    date=String(date);
    if(date.includes('T'))date=date.split('T')[0];
    if(!date.match(/^\d{4}-\d{2}-\d{2}$/))date=today;
    // Time: "1899-12-30T14:36:00.000Z" -> "14:36"
    time=String(time);
    if(time.includes('T')){
      const tMatch=time.match(/T(\d{2}):(\d{2})/);
      time=tMatch?(tMatch[1]+':'+tMatch[2]):'00:00';
    }
    time=time.replace(/[^\d:]/g,'');
    if(!time.match(/^\d{1,2}:\d{2}/))time='00:00';
    const ts=r.timestamp||'';
    switch(r.category){
      case 'diaper':{
        const dtype=(r.detail_1||'wet').toString().toLowerCase();
        if(!D.shared.baby_jah.diapers.some(d=>d.date===date&&d.time===time&&d.type===dtype)){
          D.shared.baby_jah.diapers.push({date,time,type:dtype,notes:r.notes||''});
        }}break;
      case 'feeding':{
        if(!r.detail_1||!r.detail_1.toString().trim())break;
        const feedWho=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(feedWho==='baby jah'){
          if(!D.shared.baby_jah.feeding.some(f=>f.date===date&&f.time===time&&f.food===r.detail_1)){
            D.shared.baby_jah.feeding.push({date,time,food:r.detail_1||'',notes:r.notes||''});
          }
        }else{
          const tgt=feedWho==='arabelle'?D.arabelle:D.ra;
          if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
            tgt.transactions.push({date,time,description:r.detail_1||'',amount:null,category:'food'});
          }
        }}break;
      case 'transaction':{
        const who=(r.logged_by||'RA').toLowerCase();
        const tgt=who==='arabelle'?D.arabelle:D.ra;
        if(!tgt.transactions.some(t=>t.date===date&&t.time===time&&t.description===r.detail_1)){
          tgt.transactions.push({date,time,description:r.detail_1||'',amount:r.amount?parseFloat(r.amount):null,category:r.detail_2||'shopping'});
        }}break;
      case 'balance':{
        const acct=(r.detail_1||'').toLowerCase().replace(/ /g,'_');
        if(D.shared.accounts[acct]){
          const existing=D.shared.accounts[acct].updated||'';
          if(date>=existing){
            D.shared.accounts[acct].balance=parseFloat(r.amount)||0;
            D.shared.accounts[acct].updated=date;
          }
        }}break;
      case 'activity':
        if(!D.shared.baby_jah.activities.some(a=>a.date===date&&a.time===time&&a.activity===r.detail_1)){
          D.shared.baby_jah.activities.push({date,time,activity:r.detail_1||''});
        }break;
      case 'sleep':{
        // Skip sleep entries older than 24h to prevent stale sheet data from creating phantom records
        if(date<new Date(Date.now()-86400000).toLocaleDateString('en-CA',{timeZone:'Asia/Manila'}))break;
        const action=(r.detail_1||'slept').toString().toLowerCase();
        let sleepTime=r.detail_2||time;
        sleepTime=String(sleepTime);if(sleepTime.includes('T')){const sm=sleepTime.match(/T(\d{2}):(\d{2})/);sleepTime=sm?(sm[1]+':'+sm[2]):time;}
        const who=(r.who||'Baby Jah').toString().toLowerCase().replace(/_/g,' ');
        if(who==='baby jah'||who==='baby_jah'){
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.shared.baby_jah.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.shared.baby_jah.sleep.push({date,slept:st,woke:wk,type:parseInt(sleepTime)>=18||parseInt(sleepTime)<6?'night':'nap',notes:r.notes||''});
          }
        }else{
          const st=action==='slept'?sleepTime:null,wk=action==='woke'?sleepTime:null;
          if(!D.ra.schedule.sleep.some(s=>s.date===date&&s.slept===st&&s.woke===wk)){
            D.ra.schedule.sleep.push({date,slept:st,woke:wk,notes:r.notes||''});
          }
        }}break;
    }
  }
  // Sort arrays by date+time
  const sortDT=(a,b)=>(a.date+a.time).localeCompare(b.date+b.time);
  D.shared.baby_jah.diapers.sort(sortDT);
  D.shared.baby_jah.feeding.sort(sortDT);
  D.shared.baby_jah.activities.sort(sortDT);
  D.shared.baby_jah.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.schedule.sleep.sort((a,b)=>(a.date+(a.slept||a.woke||'')).localeCompare(b.date+(b.slept||b.woke||'')));
  D.ra.transactions.sort(sortDT);
}

// === TIMEOUT FETCH ===
function fetchWithTimeout(url,opts={},ms=3000){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),ms);
  return fetch(url,{...opts,signal:ctrl.signal}).finally(()=>clearTimeout(timer));
}

// === INIT ===
async function init(){
  try{
    // Load JSON first (critical path)
    const dataRes=await fetch('dashboard-data.json');
    D=await dataRes.json();

    // Fire all 3 API calls in parallel with timeouts
    const [,sheetRows,weather]=await Promise.all([
      fetchHolidays(),
      fetchWithTimeout(QUICKLOG_ENDPOINT,{},4000).then(r=>r.json()).catch(()=>null),
      fetchWeather(D.location.lat,D.location.lon)
    ]);
    if(sheetRows)mergeSheetData(D,sheetRows);
    W=weather;

    updateHeader();buildTabs();render();

    const updated=new Date(D.last_updated);
    document.getElementById('dash-label').textContent='Updated '+updated.toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
    document.getElementById('footer').textContent='RA Dashboard';

    if(isStale(D.last_updated,3)){
      document.getElementById('status-dot').style.background='var(--orange)';
      document.getElementById('status-dot').style.boxShadow='0 0 6px var(--orange)';
    }
    document.getElementById('loader').classList.add('hide');
    setTimeout(()=>{const l=document.getElementById('loader');if(l)l.remove()},500);
  }catch(e){
    document.getElementById('loader').classList.add('hide');
    document.getElementById('ov').innerHTML=`<div class="c"><div class="ct m">Error</div><p style="color:var(--red);font-size:13px">Could not load: ${e.message}</p></div>`;
  }
}
init();
